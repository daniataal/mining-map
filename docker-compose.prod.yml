# Production VM stack — registry images only (no build: contexts).
# Deploy: export VERSION_TAG=v<run> (and secrets via backend.env), then:
#   docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d
#
# Full stack needs ~4–6 GB RAM. Elasticsearch host prep (one-time on Linux VM):
#   sudo sysctl -w vm.max_map_count=262144
#   echo "vm.max_map_count=262144" | sudo tee -a /etc/sysctl.conf
#
# Ports: backend :8000, frontend :5173, oil-live-intel :8095, Caddy :8080/:8443 (override via
# MINING_MAP_CADDY_HTTP / MINING_MAP_CADDY_HTTPS). With Caddy, browser can use :8080 for same-origin
# /api/oil-live/* proxy; direct access remains :8000 / :5173 / :8095.

services:
  backend:
    image: dannyatalla/mining-backend:${VERSION_TAG:-latest}
    platform: linux/arm64
    container_name: mining-backend
    restart: always
    env_file:
      - backend.env
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=mining_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - AI_HTTP_TIMEOUT_SECONDS
      - AI_HTTP_MAX_RETRIES
      - AI_ANALYSIS_DEADLINE_SECONDS
      - AI_ENRICHMENT_DEADLINE_SECONDS
      - POLLINATIONS_HTTP_TIMEOUT_SECONDS
      - POLLINATIONS_HTTP_MAX_RETRIES
      - DISABLE_POLLINATIONS_FALLBACK
      - SECRET_KEY
      - COMTRADE_API_KEY
      - COMTRADE_API_KEY_SECONDARY
      - COMTRADE_SYNC_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ROUTE_SERVICE_URL=http://route-service:8001
      - OIL_INTEL_API_URL=http://oil-live-intel:8095
      - OIL_INTEL_INTERNAL_KEY
      - OIL_GRAPH_SYNC_ENABLED=true
      - OIL_GRAPH_SYNC_ON_STARTUP=false
      - MARITIME_GULF_DEMO_SEED=0
      - MARITIME_COASTAL_DEMO_SEED=0
      - OIL_LIVE_DISABLE_DEMO_SEED=1
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=5).read(1)",
        ]
      interval: 15s
      timeout: 8s
      retries: 5
      start_period: 180s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      route-service:
        condition: service_healthy
      oil-live-intel:
        condition: service_healthy

  route-service:
    image: dannyatalla/mining-backend:${VERSION_TAG:-latest}
    platform: linux/arm64
    container_name: mining-route-service
    restart: always
    command: ["python", "-m", "route_service"]
    expose:
      - "8001"
    mem_limit: ${ROUTE_SERVICE_MEM_LIMIT:-2g}
    environment:
      - ROUTE_SERVICE_PORT=8001
      - ROUTE_PLAN_DEADLINE_SEC=${ROUTE_PLAN_DEADLINE_SEC:-120}
      - OSRM_GEOMETRY_CACHE_MAX=${OSRM_GEOMETRY_CACHE_MAX:-8192}
      - OSRM_BASE_URL=${OSRM_BASE_URL:-https://router.project-osrm.org}
      - OSRM_TIMEOUT_SEC=${OSRM_TIMEOUT_SEC:-8}
      - SEAROUTE_ENABLED=${SEAROUTE_ENABLED:-1}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5).read(1)",
        ]
      interval: 15s
      timeout: 8s
      retries: 5
      start_period: 30s

  maritime-worker:
    image: dannyatalla/mining-backend:${VERSION_TAG:-latest}
    platform: linux/arm64
    container_name: mining-maritime-worker
    restart: always
    command: ["python", "maritime_worker.py"]
    env_file:
      - backend.env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=mining_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - MARITIME_WORKER_INTERVAL_SECONDS=60
      - MARITIME_WORKER_CAPTURE_WINDOW_SECONDS=25
      - MARITIME_WORKER_MAX_VESSELS=15000
      - MARITIME_WORKER_WATCH_MODE=all_regions
      - MARITIME_WORKER_SCOPE=all_vessels
      - MARITIME_GULF_DEMO_SEED=0
      - MARITIME_COASTAL_DEMO_SEED=0
      - MARITIME_SNAPSHOT_TTL_SECONDS=300
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  license-sync-worker:
    image: dannyatalla/mining-backend:${VERSION_TAG:-latest}
    platform: linux/arm64
    container_name: mining-license-sync-worker
    restart: always
    command: ["python", "license_daily_sync_worker.py"]
    env_file:
      - backend.env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=mining_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - LICENSE_DAILY_SYNC_INTERVAL_SECONDS=86400
      - LICENSE_DAILY_SYNC_BACKOFF_SECONDS=600
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  comtrade-sync-worker:
    image: dannyatalla/mining-backend:${VERSION_TAG:-latest}
    platform: linux/arm64
    container_name: mining-comtrade-sync-worker
    restart: always
    command: ["python", "comtrade_sync_worker.py"]
    env_file:
      - backend.env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=mining_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - COMTRADE_API_KEY
      - COMTRADE_API_KEY_SECONDARY
      - COMTRADE_SYNC_ENABLED=true
      - COMTRADE_SYNC_INTERVAL_SECONDS=86400
      - COMTRADE_SYNC_BACKOFF_SECONDS=3600
      - COMTRADE_SYNC_SLEEP_SECONDS=1.2
    depends_on:
      db:
        condition: service_healthy

  petroleum-osm-worker:
    image: dannyatalla/mining-backend:${VERSION_TAG:-latest}
    platform: linux/arm64
    container_name: mining-petroleum-osm-worker
    restart: always
    command: ["python", "petroleum_osm_sync_worker.py"]
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=mining_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - PETROLEUM_OSM_SYNC_ENABLED=true
      - PETROLEUM_OSM_SYNC_INTERVAL_SECONDS=86400
      - PETROLEUM_OSM_SYNC_BACKOFF_SECONDS=3600
      - OVERPASS_URL=${OVERPASS_URL:-https://overpass.kumi.systems/api/interpreter}
      - STORAGE_SKIP_LIVE_OVERPASS=true
    depends_on:
      db:
        condition: service_healthy

  ted-procurement-worker:
    image: dannyatalla/mining-backend:${VERSION_TAG:-latest}
    platform: linux/arm64
    container_name: mining-ted-procurement-worker
    restart: always
    command: ["python", "ted_procurement_sync_worker.py"]
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=mining_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - TED_PROCUREMENT_SYNC_ENABLED=true
      - TED_PROCUREMENT_SYNC_INTERVAL_SECONDS=604800
      - TED_PROCUREMENT_SYNC_BACKOFF_SECONDS=3600
    depends_on:
      db:
        condition: service_healthy

  gov-procurement-sync-worker:
    image: dannyatalla/mining-backend:${VERSION_TAG:-latest}
    platform: linux/arm64
    container_name: mining-gov-procurement-sync-worker
    restart: always
    command: ["python", "gov_procurement_sync_worker.py"]
    env_file:
      - backend.env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=mining_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - GOV_PROCUREMENT_SYNC_ENABLED=true
      - GOV_PROCUREMENT_SYNC_INTERVAL_SECONDS=604800
      - GOV_PROCUREMENT_SYNC_BACKOFF_SECONDS=3600
      - GOV_PROCUREMENT_SYNC_MAX_PAGES_PER_PROFILE=3
      - GOV_PROCUREMENT_SYNC_SLEEP_SECONDS=0.25
    depends_on:
      db:
        condition: service_healthy

  oil-live-graph-sync-worker:
    image: dannyatalla/mining-backend:${VERSION_TAG:-latest}
    platform: linux/arm64
    container_name: mining-oil-live-graph-sync-worker
    restart: always
    command: ["python", "oil_live_graph_sync_worker.py"]
    env_file:
      - backend.env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=mining_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - OIL_GRAPH_SYNC_ENABLED=true
      - OIL_GRAPH_SYNC_INTERVAL_SECONDS=86400
      - OIL_GRAPH_SYNC_BACKOFF_SECONDS=3600
      - OIL_GRAPH_STORAGE_IMPORT_CAP=5000
      - OIL_INTEL_API_URL=http://oil-live-intel:8095
      - OIL_INTEL_INTERNAL_KEY
      - OIL_LIVE_DISABLE_DEMO_SEED=1
    depends_on:
      db:
        condition: service_healthy
      oil-live-intel:
        condition: service_healthy

  sweden-mining-worker:
    image: dannyatalla/mining-backend:${VERSION_TAG:-latest}
    platform: linux/arm64
    container_name: mining-sweden-mining-worker
    restart: always
    command: ["python", "sweden_mining_sync_worker.py"]
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=mining_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - SGU_MINING_SYNC_ENABLED=true
      - SGU_SYNC_INTERVAL_SECONDS=604800
      - SGU_SYNC_BACKOFF_SECONDS=3600
    depends_on:
      db:
        condition: service_healthy

  arcgis-probe-worker:
    image: dannyatalla/mining-backend:${VERSION_TAG:-latest}
    platform: linux/arm64
    container_name: mining-arcgis-probe-worker
    restart: always
    command: ["python", "arcgis_probe_sync_worker.py"]
    env_file:
      - backend.env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=mining_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - PROBE_SYNC_ENABLED=true
      - PROBE_SYNC_INTERVAL_SECONDS=604800
      - PROBE_SYNC_BACKOFF_SECONDS=3600
      - KZ_EGOV_API_KEY
    depends_on:
      db:
        condition: service_healthy

  kazakhstan-mining-worker:
    image: dannyatalla/mining-backend:${VERSION_TAG:-latest}
    platform: linux/arm64
    container_name: mining-kazakhstan-mining-worker
    restart: always
    command: ["python", "kazakhstan_mining_sync_worker.py"]
    env_file:
      - backend.env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=mining_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - KZ_EGOV_API_KEY
      - KZ_EGOV_SYNC_INTERVAL_SECONDS=86400
      - KZ_EGOV_SYNC_BACKOFF_SECONDS=3600
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:alpine
    platform: linux/arm64
    container_name: mining-redis
    restart: always
    ports:
      - "6379:6379"

  frontend:
    image: dannyatalla/mining-frontend:${VERSION_TAG:-latest}
    platform: linux/arm64
    container_name: mining-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=${VITE_API_BASE:-}
      - OIL_INTEL_PROXY_TARGET=http://oil-live-intel:8095
    depends_on:
      backend:
        condition: service_healthy
      route-service:
        condition: service_healthy

  oil-live-intel:
    image: dannyatalla/oil-live-intel:${VERSION_TAG:-latest}
    platform: linux/arm64
    container_name: oil-live-intel
    restart: unless-stopped
    ports:
      - "8095:8095"
    env_file:
      - backend.env
    environment:
      - OIL_INTEL_PORT=8095
      - DATABASE_URL=postgresql://postgres:password@db:5432/mining_db?sslmode=disable
      - EXISTING_BACKEND_URL=http://backend:8000
      - SUPPLIER_CREATE_ENDPOINT=/licenses
      - OIL_INTEL_SEED_ON_STARTUP=false
      - OIL_LIVE_DISABLE_DEMO_SEED=1
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ENABLE_AIS=${OIL_INTEL_ENABLE_AIS:-true}
      - ENABLE_EIA=${OIL_INTEL_ENABLE_EIA:-true}
      - ENABLE_COMTRADE=${OIL_INTEL_ENABLE_COMTRADE:-true}
      - ENABLE_OSM_IMPORT=false
      - OIL_INTEL_AIS_INSECURE_TLS=${OIL_INTEL_AIS_INSECURE_TLS:-false}
      - AISSTREAM_API_KEY
      - EIA_API_KEY
      - COMTRADE_API_KEY
      - OIL_INTEL_INTERNAL_KEY
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8095/api/oil-live/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy

  oil-live-intel-worker:
    image: dannyatalla/oil-live-intel:${VERSION_TAG:-latest}
    platform: linux/arm64
    container_name: oil-live-intel-worker
    restart: unless-stopped
    entrypoint: ["/app/worker"]
    env_file:
      - backend.env
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/mining_db?sslmode=disable
      - OIL_INTEL_API_URL=http://oil-live-intel:8095
      - OIL_INTEL_SEED_ON_STARTUP=false
      - OIL_LIVE_DISABLE_DEMO_SEED=1
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ENABLE_AIS=${OIL_INTEL_ENABLE_AIS:-true}
      - ENABLE_EIA=${OIL_INTEL_ENABLE_EIA:-true}
      - ENABLE_COMTRADE=${OIL_INTEL_ENABLE_COMTRADE:-true}
      - ENABLE_OSM_IMPORT=false
      - OIL_INTEL_AIS_INSECURE_TLS=${OIL_INTEL_AIS_INSECURE_TLS:-false}
      - AISSTREAM_API_KEY
      - EIA_API_KEY
      - COMTRADE_API_KEY
      - OIL_INTEL_INTERNAL_KEY
    depends_on:
      db:
        condition: service_healthy
      oil-live-intel:
        condition: service_healthy

  oil-live-search-indexer:
    image: dannyatalla/oil-live-intel:${VERSION_TAG:-latest}
    platform: linux/arm64
    container_name: oil-live-search-indexer
    restart: unless-stopped
    entrypoint: ["/app/search-indexer"]
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/mining_db?sslmode=disable
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - SEARCH_INDEXER_INTERVAL_SECONDS=${SEARCH_INDEXER_INTERVAL_SECONDS:-300}
      - OIL_INTEL_SEED_ON_STARTUP=false
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    platform: linux/arm64
    container_name: mining-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    expose:
      - "9200"
    volumes:
      - meridian_elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:9200/_cluster/health | grep -E '\"status\":\"(green|yellow)\"' >/dev/null",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  db:
    image: dannyatalla/mining-db:latest
    platform: linux/arm64
    container_name: mining-db
    restart: always
    environment:
      POSTGRES_DB: mining_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mining_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:alpine
    platform: linux/arm64
    container_name: mining-caddy
    restart: unless-stopped
    ports:
      - "${MINING_MAP_CADDY_HTTP:-8080}:80"
      - "${MINING_MAP_CADDY_HTTPS:-8443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
      oil-live-intel:
        condition: service_healthy

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  meridian_elasticsearch_data:
