# MadSan V2 stack — default: db + api + worker + scheduler + frontend
# Optional reverse proxy: docker compose --profile proxy up -d
#
# Hybrid dev (DB only in Docker, API/UI on host): docker compose up -d madsan-db
# Full stack: ./madsan/scripts/compose_up.sh

x-backend-env: &backend-env
  DATABASE_URL: postgresql://postgres:${MADSAN_DB_PASSWORD:-password}@madsan-db:5432/madsan_db?sslmode=disable
  LEGACY_DATABASE_URL: ${LEGACY_DATABASE_URL:-postgresql://postgres:password@host.docker.internal:5434/mining_db?sslmode=disable}
  MADSAN_JWT_SECRET: ${MADSAN_JWT_SECRET:-change-me}
  MADSAN_AIS_SYNC: ${MADSAN_AIS_SYNC:-true}
  MADSAN_AIS_SYNC_SEC: ${MADSAN_AIS_SYNC_SEC:-30}
  MADSAN_LEGACY_PYTHON: ${MADSAN_LEGACY_PYTHON:-false}
  MADSAN_RAW_DIR: /raw
  EIA_API_KEY: ${EIA_API_KEY:-}
  OPENSANCTIONS_API_KEY: ${OPENSANCTIONS_API_KEY:-}

x-host-gateway: &host-gateway
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  madsan-db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${MADSAN_DB_PASSWORD:-password}
      POSTGRES_DB: madsan_db
    volumes:
      - madsan_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d madsan_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  madsan-api:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile.api
    environment:
      <<: *backend-env
      MADSAN_API_ADDR: ":8080"
      MADSAN_RUN_MIGRATIONS: "true"
    ports:
      - "8088:8080"
    depends_on:
      madsan-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    <<: *host-gateway

  madsan-worker:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile.api
    command: ["/app/worker"]
    environment:
      <<: *backend-env
      MADSAN_ETL_DIR: /etl
    volumes:
      - ../raw:/raw:ro
      - ../etl:/etl:ro
    depends_on:
      madsan-db:
        condition: service_healthy
      madsan-api:
        condition: service_healthy
    restart: unless-stopped
    <<: *host-gateway

  madsan-scheduler:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile.api
    command: ["/app/scheduler"]
    environment:
      <<: *backend-env
    volumes:
      - ../raw:/raw:ro
    depends_on:
      madsan-db:
        condition: service_healthy
    restart: unless-stopped
    <<: *host-gateway

  madsan-frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8088}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8088}
    ports:
      - "3001:3000"
    depends_on:
      madsan-api:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    profiles: ["proxy"]
    image: caddy:2-alpine
    ports:
      - "9080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      madsan-api:
        condition: service_healthy
      madsan-frontend:
        condition: service_started
    restart: unless-stopped

volumes:
  madsan_postgres_data:
    name: madsan_postgres_data
