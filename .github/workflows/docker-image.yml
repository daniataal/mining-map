name: Docker Image CI and Remote Deployment

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".paperclip/**"
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".paperclip/**"

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      build_number: ${{ steps.version.outputs.build_number }}
      short_sha: ${{ steps.version.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set Build Version
        id: version
        run: |
          echo "build_number=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

  build:
    needs: meta
    # Production VM (docker-compose.prod.yml) is linux/arm64 — native build, no QEMU amd64 pass.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            image: dannyatalla/mining-backend
            dockerfile: Dockerfile
            build_args: BASE_IMAGE=dannyatalla/mining-map-base:latest
          - service: frontend
            context: ./mining-viz
            image: dannyatalla/mining-frontend
            dockerfile: Dockerfile
            build_args: ""
          - service: oil-live-intel
            context: ./oil-live-intel
            image: dannyatalla/oil-live-intel
            dockerfile: Dockerfile
            build_args: BASE_IMAGE=dannyatalla/oil-live-intel-base:latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:v${{ github.run_number }}
            ${{ matrix.image }}:${{ needs.meta.outputs.short_sha }}
          cache-from: |
            type=gha,scope=${{ matrix.service }}
            type=registry,ref=${{ matrix.image }}:latest
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: ${{ matrix.build_args }}

  validate:
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate production compose YAML
        run: |
          touch backend.env
          export VERSION_TAG=v${{ needs.meta.outputs.build_number }}
          docker compose -f docker-compose.prod.yml config --quiet

  # Deploy job — required GitHub secrets (repository Settings → Secrets):
  #   DOCKER_USERNAME, DOCKER_PASSWORD — registry push (build job)
  #   REMOTE_HOST, REMOTE_USER, REMOTE_SSH_KEY — SSH to production VM
  #   AISSTREAM_API_KEY, ADMIN_TOKEN — maritime + admin CSV import
  #   GROQ_AI_API_KEY or GROQ_API_KEY, OPENROUTER_AI_API_KEY or OPENROUTER_API_KEY
  #   MAPBOX_ACCESS_TOKEN or MAPBOX_TOKEN — petroleum Mapbox tiles
  #   COMTRADE_API_KEY (optional COMTRADE_API_KEY_SECONDARY)
  #   EIA_API_KEY, CENSUS_API_KEY, USITC_DATAWEB_API_KEY — trade / graph sync
  #   OIL_INTEL_INTERNAL_KEY — shared auth between backend and oil-live-intel (required in prod)
  #   SECRET_KEY — JWT/session signing for backend (required in prod)
  #   SHIPVAULT_REFRESH_TOKEN — optional long-lived vessel registry enrichment token
  #   SHIPVAULT_SESSION_JSON / SHIPVAULT_BEARER_TOKEN — optional emergency bootstrap fallbacks
  #   SHIPVAULT_FIREBASE_API_KEY / SHIPVAULT_CACHE_TTL_DAYS — optional ShipVault tuning
  #   SHIPVAULT_BACKFILL_ENABLED / LIMIT / INTERVAL_HOURS — optional bounded registry cache backfill tuning
  #   KZ_EGOV_API_KEY, OPENSANCTIONS_API_KEY, COURTLISTENER_API_KEY — optional ingest
  #   SYNC_ALERT_WEBHOOK_URL — optional drift alerts
  # VM: full stack ~4–6 GB RAM. One-time host sysctl for Elasticsearch:
  #   sudo sysctl -w vm.max_map_count=262144
  deploy:
    needs: [meta, build, validate]
    # if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/changebackend-and-makeitwork!'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Resolve CSV auto-import inputs
      id: csv_import
      run: |
        AUTO_IMPORT="${{ vars.AUTO_IMPORT_LICENSES_CSV }}"
        if [ -z "$AUTO_IMPORT" ]; then
          AUTO_IMPORT="true"
        fi

        # If it only exists in the subfolder, copy it to the root so scp-action uploads it directly to /tmp/licenses_export.csv
        if [ ! -f "licenses_export.csv" ] && [ -f "mining-viz/licenses_export.csv" ]; then
          cp mining-viz/licenses_export.csv licenses_export.csv
        fi

        if [ -f "licenses_export.csv" ]; then
          echo "csv_exists=true" >> "$GITHUB_OUTPUT"
          echo "csv_path=licenses_export.csv" >> "$GITHUB_OUTPUT"
        else
          echo "csv_exists=false" >> "$GITHUB_OUTPUT"
          echo "csv_path=" >> "$GITHUB_OUTPUT"
        fi

        echo "enabled=$AUTO_IMPORT" >> "$GITHUB_OUTPUT"

    - name: Upload official registry CSV to remote VM
      if: steps.csv_import.outputs.enabled == 'true' && steps.csv_import.outputs.csv_exists == 'true'
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        port: 22
        key: ${{ secrets.REMOTE_SSH_KEY }}
        source: ${{ steps.csv_import.outputs.csv_path }}
        target: /tmp/

    - name: Upload production compose and Caddyfile to remote VM
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        port: 22
        key: ${{ secrets.REMOTE_SSH_KEY }}
        source: docker-compose.prod.yml,Caddyfile
        target: /tmp/mining-map-deploy/

    - name: Deploy to remote server
      uses: appleboy/ssh-action@v1.1.0
      env:
        # GitHub secret names → runtime env names mapped in remote script below.
        GROQ_AI_API_KEY: ${{ secrets.GROQ_AI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        OPENROUTER_AI_API_KEY: ${{ secrets.OPENROUTER_AI_API_KEY }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
        ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        AUTO_IMPORT_LICENSES_CSV: ${{ steps.csv_import.outputs.enabled }}
        CSV_UPLOADED: ${{ steps.csv_import.outputs.csv_exists }}
        REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
        MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
        MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        COMTRADE_API_KEY: ${{ secrets.COMTRADE_API_KEY }}
        COMTRADE_API_KEY_SECONDARY: ${{ secrets.COMTRADE_API_KEY_SECONDARY }}
        EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        USITC_DATAWEB_API_KEY: ${{ secrets.USITC_DATAWEB_API_KEY }}
        KZ_EGOV_API_KEY: ${{ secrets.KZ_EGOV_API_KEY }}
        OPENSANCTIONS_API_KEY: ${{ secrets.OPENSANCTIONS_API_KEY }}
        COURTLISTENER_API_KEY: ${{ secrets.COURTLISTENER_API_KEY }}
        SYNC_ALERT_WEBHOOK_URL: ${{ secrets.SYNC_ALERT_WEBHOOK_URL }}
        OIL_INTEL_INTERNAL_KEY: ${{ secrets.OIL_INTEL_INTERNAL_KEY }}
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        SHIPVAULT_REFRESH_TOKEN: ${{ secrets.SHIPVAULT_REFRESH_TOKEN }}
        SHIPVAULT_SESSION_JSON: ${{ secrets.SHIPVAULT_SESSION_JSON }}
        SHIPVAULT_BEARER_TOKEN: ${{ secrets.SHIPVAULT_BEARER_TOKEN }}
        SHIPVAULT_FIREBASE_API_KEY: ${{ secrets.SHIPVAULT_FIREBASE_API_KEY }}
        SHIPVAULT_CACHE_TTL_DAYS: ${{ vars.SHIPVAULT_CACHE_TTL_DAYS }}
        SHIPVAULT_BACKFILL_ENABLED: ${{ vars.SHIPVAULT_BACKFILL_ENABLED }}
        SHIPVAULT_BACKFILL_LIMIT: ${{ vars.SHIPVAULT_BACKFILL_LIMIT }}
        SHIPVAULT_BACKFILL_INTERVAL_HOURS: ${{ vars.SHIPVAULT_BACKFILL_INTERVAL_HOURS }}
        VERSION_TAG: v${{ needs.meta.outputs.build_number }}
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        port: 22
        key: ${{ secrets.REMOTE_SSH_KEY }}
        envs: GROQ_AI_API_KEY,GROQ_API_KEY,OPENROUTER_AI_API_KEY,OPENROUTER_API_KEY,AISSTREAM_API_KEY,ADMIN_TOKEN,AUTO_IMPORT_LICENSES_CSV,CSV_UPLOADED,REMOTE_HOST,VERSION_TAG,MAPBOX_ACCESS_TOKEN,MAPBOX_TOKEN,COMTRADE_API_KEY,COMTRADE_API_KEY_SECONDARY,EIA_API_KEY,CENSUS_API_KEY,USITC_DATAWEB_API_KEY,KZ_EGOV_API_KEY,OPENSANCTIONS_API_KEY,COURTLISTENER_API_KEY,SYNC_ALERT_WEBHOOK_URL,OIL_INTEL_INTERNAL_KEY,SECRET_KEY,SHIPVAULT_REFRESH_TOKEN,SHIPVAULT_SESSION_JSON,SHIPVAULT_BEARER_TOKEN,SHIPVAULT_FIREBASE_API_KEY,SHIPVAULT_CACHE_TTL_DAYS,SHIPVAULT_BACKFILL_ENABLED,SHIPVAULT_BACKFILL_LIMIT,SHIPVAULT_BACKFILL_INTERVAL_HOURS
        script: |
          # Ensure directory exists and navigate
          sudo mkdir -p /opt/mining-map
          sudo mkdir -p /opt/mining-map/data
          cd /opt/mining-map

          # Map GitHub secret names to container/runtime env names (see .env.example).
          GROQ_EFFECTIVE="${GROQ_AI_API_KEY:-${GROQ_API_KEY:-}}"
          OPENROUTER_EFFECTIVE="${OPENROUTER_AI_API_KEY:-${OPENROUTER_API_KEY:-}}"
          MAPBOX_EFFECTIVE="${MAPBOX_ACCESS_TOKEN:-${MAPBOX_TOKEN:-}}"
          COMTRADE_EFFECTIVE="${COMTRADE_API_KEY:-}"

          # Install checked-in production compose + Caddyfile (replaces inline heredoc).
          if [ -f /tmp/mining-map-deploy/docker-compose.prod.yml ]; then
            sudo mv /tmp/mining-map-deploy/docker-compose.prod.yml /opt/mining-map/docker-compose.prod.yml
          fi
          if [ -f /tmp/mining-map-deploy/Caddyfile ]; then
            sudo mv /tmp/mining-map-deploy/Caddyfile /opt/mining-map/Caddyfile
          fi

          # Persist runtime env for backend + workers + oil-live (env_file: backend.env).
          {
            printf 'AISSTREAM_API_KEY=%s\n' "$AISSTREAM_API_KEY"
            printf 'ADMIN_TOKEN=%s\n' "$ADMIN_TOKEN"
            printf 'MAPBOX_ACCESS_TOKEN=%s\n' "$MAPBOX_EFFECTIVE"
            printf 'GROQ_API_KEY=%s\n' "$GROQ_EFFECTIVE"
            printf 'OPENROUTER_API_KEY=%s\n' "$OPENROUTER_EFFECTIVE"
            printf 'DISABLE_POLLINATIONS_FALLBACK=1\n'
            printf 'COMTRADE_API_KEY=%s\n' "$COMTRADE_EFFECTIVE"
            if [ -n "${COMTRADE_API_KEY_SECONDARY:-}" ]; then
              printf 'COMTRADE_API_KEY_SECONDARY=%s\n' "$COMTRADE_API_KEY_SECONDARY"
            fi
            printf 'COMTRADE_SYNC_ENABLED=true\n'
            printf 'EIA_API_KEY=%s\n' "${EIA_API_KEY:-}"
            printf 'CENSUS_API_KEY=%s\n' "${CENSUS_API_KEY:-}"
            printf 'USITC_DATAWEB_API_KEY=%s\n' "${USITC_DATAWEB_API_KEY:-}"
            printf 'KZ_EGOV_API_KEY=%s\n' "${KZ_EGOV_API_KEY:-}"
            printf 'OPENSANCTIONS_API_KEY=%s\n' "${OPENSANCTIONS_API_KEY:-}"
            printf 'COURTLISTENER_API_KEY=%s\n' "${COURTLISTENER_API_KEY:-}"
            if [ -n "${SYNC_ALERT_WEBHOOK_URL:-}" ]; then
              printf 'SYNC_ALERT_WEBHOOK_URL=%s\n' "$SYNC_ALERT_WEBHOOK_URL"
            fi
            printf 'OIL_INTEL_INTERNAL_KEY=%s\n' "${OIL_INTEL_INTERNAL_KEY:-oil-intel-dev}"
            printf 'SECRET_KEY=%s\n' "${SECRET_KEY:-}"
            if [ -n "${SHIPVAULT_REFRESH_TOKEN:-}" ]; then
              printf 'SHIPVAULT_REFRESH_TOKEN=%s\n' "$SHIPVAULT_REFRESH_TOKEN"
            fi
            if [ -n "${SHIPVAULT_SESSION_JSON:-}" ]; then
              printf 'SHIPVAULT_SESSION_JSON=%s\n' "$SHIPVAULT_SESSION_JSON"
            fi
            if [ -n "${SHIPVAULT_BEARER_TOKEN:-}" ]; then
              printf 'SHIPVAULT_BEARER_TOKEN=%s\n' "$SHIPVAULT_BEARER_TOKEN"
            fi
            if [ -n "${SHIPVAULT_FIREBASE_API_KEY:-}" ]; then
              printf 'SHIPVAULT_FIREBASE_API_KEY=%s\n' "$SHIPVAULT_FIREBASE_API_KEY"
            fi
            if [ -n "${SHIPVAULT_CACHE_TTL_DAYS:-}" ]; then
              printf 'SHIPVAULT_CACHE_TTL_DAYS=%s\n' "$SHIPVAULT_CACHE_TTL_DAYS"
            fi
            if [ -n "${SHIPVAULT_BACKFILL_ENABLED:-}" ]; then
              printf 'SHIPVAULT_BACKFILL_ENABLED=%s\n' "$SHIPVAULT_BACKFILL_ENABLED"
            fi
            if [ -n "${SHIPVAULT_BACKFILL_LIMIT:-}" ]; then
              printf 'SHIPVAULT_BACKFILL_LIMIT=%s\n' "$SHIPVAULT_BACKFILL_LIMIT"
            fi
            if [ -n "${SHIPVAULT_BACKFILL_INTERVAL_HOURS:-}" ]; then
              printf 'SHIPVAULT_BACKFILL_INTERVAL_HOURS=%s\n' "$SHIPVAULT_BACKFILL_INTERVAL_HOURS"
            fi
            printf 'OIL_LIVE_DISABLE_DEMO_SEED=1\n'
            printf 'OIL_INTEL_SEED_ON_STARTUP=false\n'
            printf 'ELASTICSEARCH_URL=http://elasticsearch:9200\n'
            printf 'MARITIME_GULF_DEMO_SEED=0\n'
            printf 'MARITIME_COASTAL_DEMO_SEED=0\n'
            printf 'SEC_EDGAR_USER_AGENT=MeridianMiningMap/1.0 (deploy)\n'
            printf 'GLEIF_USER_AGENT=MeridianMiningMap/1.0 (deploy)\n'
          } | sudo tee backend.env >/dev/null

          # Move uploaded CSV (if present) into a stable, writable location.
          if [ "$CSV_UPLOADED" = "true" ]; then
            if [ -f /tmp/licenses_export.csv ]; then
              sudo mv /tmp/licenses_export.csv /opt/mining-map/data/licenses_export.csv
              sudo chmod 664 /opt/mining-map/data/licenses_export.csv || true
              echo "Official registry CSV prepared at /opt/mining-map/data/licenses_export.csv"
            elif [ -f /tmp/mining-viz/licenses_export.csv ]; then
              sudo mv /tmp/mining-viz/licenses_export.csv /opt/mining-map/data/licenses_export.csv
              sudo chmod 664 /opt/mining-map/data/licenses_export.csv || true
              echo "Official registry CSV (from mining-viz) prepared at /opt/mining-map/data/licenses_export.csv"
            fi
          fi

          # Pull and restart full production stack (docker-compose.prod.yml from repo).
          export VERSION_TAG="${VERSION_TAG}"
          # Empty base → browser uses :5173 same-origin; Vite proxies /api/oil-live → Go (see vite.config.ts).
          # Backend :8000 also proxies /api/oil-live/* to oil-live-intel when clients still target :8000.
          export VITE_API_BASE="${VITE_API_BASE:-}"
          export GROQ_API_KEY="${GROQ_EFFECTIVE}"
          export OPENROUTER_API_KEY="${OPENROUTER_EFFECTIVE}"
          export AISSTREAM_API_KEY="${AISSTREAM_API_KEY}"
          export MAPBOX_ACCESS_TOKEN="${MAPBOX_EFFECTIVE}"
          export COMTRADE_API_KEY="${COMTRADE_EFFECTIVE}"
          export COMTRADE_API_KEY_SECONDARY="${COMTRADE_API_KEY_SECONDARY:-}"
          export COMTRADE_SYNC_ENABLED=true
          export DISABLE_POLLINATIONS_FALLBACK=1
          export OIL_INTEL_INTERNAL_KEY="${OIL_INTEL_INTERNAL_KEY:-oil-intel-dev}"
          export SECRET_KEY="${SECRET_KEY:-}"
          export EIA_API_KEY="${EIA_API_KEY:-}"
          export AI_HTTP_TIMEOUT_SECONDS="${AI_HTTP_TIMEOUT_SECONDS:-18}"
          export AI_HTTP_MAX_RETRIES="${AI_HTTP_MAX_RETRIES:-1}"
          export AI_ANALYSIS_DEADLINE_SECONDS="${AI_ANALYSIS_DEADLINE_SECONDS:-45}"
          export AI_ENRICHMENT_DEADLINE_SECONDS="${AI_ENRICHMENT_DEADLINE_SECONDS:-20}"
          export POLLINATIONS_HTTP_TIMEOUT_SECONDS="${POLLINATIONS_HTTP_TIMEOUT_SECONDS:-12}"
          export POLLINATIONS_HTTP_MAX_RETRIES="${POLLINATIONS_HTTP_MAX_RETRIES:-0}"
          sudo -E docker compose -f docker-compose.prod.yml pull
          sudo -E docker compose -f docker-compose.prod.yml up -d --remove-orphans

          # Wait until /licenses returns 200
          BACKEND_READY="false"
          for i in $(seq 1 90); do
            HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" --connect-timeout 2 --max-time 120 \
              "http://localhost:8000/licenses" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              BACKEND_READY="true"
              break
            fi
            sleep 2
          done

          sudo docker compose -f docker-compose.prod.yml exec -T backend python -c "import os; keys=('GROQ_API_KEY','OPENROUTER_API_KEY','DISABLE_POLLINATIONS_FALLBACK','MAPBOX_ACCESS_TOKEN','AISSTREAM_API_KEY','COMTRADE_API_KEY','COMTRADE_API_KEY_SECONDARY','COMTRADE_SYNC_ENABLED','OIL_INTEL_INTERNAL_KEY','SECRET_KEY','OIL_INTEL_API_URL','ROUTE_SERVICE_URL','AI_HTTP_TIMEOUT_SECONDS','AI_HTTP_MAX_RETRIES','AI_ANALYSIS_DEADLINE_SECONDS','AI_ENRICHMENT_DEADLINE_SECONDS','POLLINATIONS_HTTP_TIMEOUT_SECONDS','POLLINATIONS_HTTP_MAX_RETRIES'); [print(f'{key}={\"SET\" if os.getenv(key) else \"MISSING\"}') for key in keys]"

          if [ "$BACKEND_READY" = "true" ] && [ -n "${ADMIN_TOKEN}" ]; then
            EXPORT_STATUS=$(curl -sS -o /opt/mining-map/data/licenses_export.csv -w "%{http_code}" \
              -H "X-Admin-Token: ${ADMIN_TOKEN}" \
              "http://localhost:8000/api/admin/licenses/export?format=csv")
            echo "DB license export status: $EXPORT_STATUS"
          fi

          OIL_LIVE_READY="false"
          for i in $(seq 1 45); do
            if curl -sf http://localhost:8095/api/oil-live/health >/dev/null 2>&1; then
              OIL_LIVE_READY="true"
              break
            fi
            sleep 2
          done
          echo "oil-live-intel ready: $OIL_LIVE_READY"

          if [ "$BACKEND_READY" = "true" ] && [ "$OIL_LIVE_READY" = "true" ] && [ -n "${ADMIN_TOKEN}" ]; then
            nohup curl -sS --max-time 600 -o /tmp/oil_graph_sync_response.json -w "%{http_code}" \
              -X POST "http://localhost:8000/api/admin/oil-live/graph-sync" \
              -H "X-Admin-Token: ${ADMIN_TOKEN}" \
              >/tmp/oil_graph_sync_http_code.txt 2>&1 &
            echo "Started background graph-sync (check /tmp/oil_graph_sync_response.json and mining-oil-live-graph-sync-worker logs)"
          fi

          if [ "$BACKEND_READY" = "true" ] && [ "${AUTO_IMPORT_LICENSES_CSV}" = "true" ] && [ -f /opt/mining-map/data/licenses_export.csv ] && [ -n "${ADMIN_TOKEN}" ]; then
            IMPORT_STATUS=$(curl -sS -o /tmp/licenses_import_response.json -w "%{http_code}" \
              -X POST "http://localhost:8000/api/admin/import/extracted-csv?countries=South%20Africa,Ghana&sector=mining" \
              -H "X-Admin-Token: ${ADMIN_TOKEN}" \
              -F "file=@/opt/mining-map/data/licenses_export.csv")
            echo "CSV auto-import status: $IMPORT_STATUS"
          fi
          
          # Deep Clean
          sudo docker image prune -af
