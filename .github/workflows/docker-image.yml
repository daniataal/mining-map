name: Docker Image CI and Remote Deployment

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set Build Version
      id: version
      run: |
        echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV

    - name: Resolve CSV auto-import inputs
      id: csv_import
      run: |
        AUTO_IMPORT="${{ vars.AUTO_IMPORT_LICENSES_CSV }}"
        if [ -z "$AUTO_IMPORT" ]; then
          AUTO_IMPORT="true"
        fi

        CSV_PATH=""
        if [ -f "licenses_export.csv" ]; then
          CSV_PATH="licenses_export.csv"
        elif [ -f "mining-viz/licenses_export.csv" ]; then
          CSV_PATH="mining-viz/licenses_export.csv"
        fi

        if [ -n "$CSV_PATH" ]; then
          echo "csv_exists=true" >> "$GITHUB_OUTPUT"
          echo "csv_path=$CSV_PATH" >> "$GITHUB_OUTPUT"
        else
          echo "csv_exists=false" >> "$GITHUB_OUTPUT"
          echo "csv_path=" >> "$GITHUB_OUTPUT"
        fi

        echo "enabled=$AUTO_IMPORT" >> "$GITHUB_OUTPUT"

    - name: Upload fallback CSV to remote VM
      if: steps.csv_import.outputs.enabled == 'true' && steps.csv_import.outputs.csv_exists == 'true'
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        port: 22
        key: ${{ secrets.REMOTE_SSH_KEY }}
        source: ${{ steps.csv_import.outputs.csv_path }}
        target: /tmp/

    - name: Build and Push Backend
      run: |
        docker build -t dannyatalla/mining-backend:v${{ env.BUILD_NUMBER }} ./backend
        docker push dannyatalla/mining-backend:v${{ env.BUILD_NUMBER }}

    - name: Build and Push Frontend (MadSan Global Intelligence)
      run: |
        docker build -t dannyatalla/mining-frontend:v${{ env.BUILD_NUMBER }} ./mining-viz
        docker push dannyatalla/mining-frontend:v${{ env.BUILD_NUMBER }}

    - name: Deploy to remote server
      uses: appleboy/ssh-action@v1.1.0
      env:
        AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
        ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        AUTO_IMPORT_LICENSES_CSV: ${{ steps.csv_import.outputs.enabled }}
        CSV_UPLOADED: ${{ steps.csv_import.outputs.csv_exists }}
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        port: 22
        key: ${{ secrets.REMOTE_SSH_KEY }}
        envs: AISSTREAM_API_KEY,ADMIN_TOKEN,AUTO_IMPORT_LICENSES_CSV,CSV_UPLOADED
        script: |
          VERSION="v${{ env.BUILD_NUMBER }}"
          
          # Ensure directory exists and navigate
          sudo mkdir -p /opt/mining-map
          sudo mkdir -p /opt/mining-map/data
          cd /opt/mining-map

          # Persist runtime-only backend secrets on the VM for docker compose.
          {
            printf 'AISSTREAM_API_KEY=%s\n' "$AISSTREAM_API_KEY"
            printf 'ADMIN_TOKEN=%s\n' "$ADMIN_TOKEN"
          } | sudo tee backend.env >/dev/null

          # Move uploaded CSV (if present) into a stable, writable location.
          if [ "$CSV_UPLOADED" = "true" ] && [ -f /tmp/licenses_export.csv ]; then
            sudo mv /tmp/licenses_export.csv /opt/mining-map/data/licenses_export.csv
            sudo chmod 664 /opt/mining-map/data/licenses_export.csv || true
            echo "Fallback CSV prepared at /opt/mining-map/data/licenses_export.csv"
          fi

          # Create the modern split-service docker-compose.yml
          # We don't escape the $VERSION here so the actual value is written to the file
          cat <<EOF | sudo tee docker-compose.yml
          services:
            backend:
              image: dannyatalla/mining-backend:$VERSION
              container_name: mining-backend
              restart: always
              env_file:
                - backend.env
              ports:
                - "8000:8000"
              environment:
                - DB_HOST=db
                - DB_PORT=5432
                - DB_NAME=mining_db
                - DB_USER=postgres
                - DB_PASSWORD=password
              depends_on:
                db:
                  condition: service_healthy

            maritime-worker:
              image: dannyatalla/mining-backend:$VERSION
              container_name: mining-maritime-worker
              restart: always
              command: ["python", "maritime_worker.py"]
              env_file:
                - backend.env
              environment:
                - DB_HOST=db
                - DB_PORT=5432
                - DB_NAME=mining_db
                - DB_USER=postgres
                - DB_PASSWORD=password
                - MARITIME_WORKER_INTERVAL_SECONDS=60
                - MARITIME_WORKER_CAPTURE_WINDOW_SECONDS=10
                - MARITIME_WORKER_MAX_VESSELS=120
                - MARITIME_WORKER_SCOPE=all_vessels
                - MARITIME_SNAPSHOT_TTL_SECONDS=300
              depends_on:
                db:
                  condition: service_healthy

            frontend:
              image: dannyatalla/mining-frontend:$VERSION
              container_name: mining-frontend
              restart: always
              ports:
                - "5173:5173"
              environment:
                - VITE_API_BASE=http://${{ secrets.REMOTE_HOST }}:8000
              depends_on:
                - backend

            db:
              image: postgis/postgis:15-3.3-alpine
              container_name: mining-db
              restart: always
              environment:
                POSTGRES_DB: mining_db
                POSTGRES_USER: postgres
                POSTGRES_PASSWORD: password
              volumes:
                - postgres_data:/var/lib/postgresql/data
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U postgres -d mining_db"]
                interval: 5s
                timeout: 5s
                retries: 5

          volumes:
            postgres_data:
          EOF

          # Stop and remove the OLD monolithic container if it exists
          sudo docker rm -f mining-map-app-1 mining-map-auto || true

          # Pull and Restart using the new split architecture
          sudo docker compose pull
          sudo docker compose up -d --remove-orphans

          # Wait for backend API to become healthy enough for admin import.
          BACKEND_READY="false"
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/licenses >/dev/null; then
              BACKEND_READY="true"
              break
            fi
            sleep 2
          done

          if [ "$BACKEND_READY" != "true" ]; then
            echo "Backend did not become ready in time; skipping CSV auto-import."
          elif [ "${AUTO_IMPORT_LICENSES_CSV}" != "true" ]; then
            echo "AUTO_IMPORT_LICENSES_CSV disabled; skipping CSV auto-import."
          elif [ ! -f /opt/mining-map/data/licenses_export.csv ]; then
            echo "No fallback CSV found at /opt/mining-map/data/licenses_export.csv; skipping CSV auto-import."
          elif [ -z "${ADMIN_TOKEN}" ]; then
            echo "ADMIN_TOKEN is not set; skipping CSV auto-import."
          else
            IMPORT_STATUS=$(curl -sS -o /tmp/licenses_import_response.json -w "%{http_code}" \
              -X POST "http://localhost:8000/api/admin/import/extracted-csv?countries=South%20Africa,Ghana&sector=mining" \
              -H "X-Admin-Token: ${ADMIN_TOKEN}" \
              -F "file=@/opt/mining-map/data/licenses_export.csv")

            if [[ "$IMPORT_STATUS" =~ ^2[0-9][0-9]$ ]]; then
              echo "CSV auto-import completed (HTTP ${IMPORT_STATUS})."
            else
              echo "CSV auto-import failed (HTTP ${IMPORT_STATUS}); continuing deploy."
              if [ -f /tmp/licenses_import_response.json ]; then
                cat /tmp/licenses_import_response.json
              fi
            fi
          fi
          
          # Deep Clean: Remove ALL unused images to reclaim maximum disk space
          sudo docker image prune -af
