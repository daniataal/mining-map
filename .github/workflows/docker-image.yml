name: Docker Image CI and Remote Deployment

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      build_number: ${{ steps.version.outputs.build_number }}
      short_sha: ${{ steps.version.outputs.short_sha }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set Build Version
      id: version
      run: |
        echo "build_number=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
        echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

    - name: Build and Push Backend
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          dannyatalla/mining-backend:latest
          dannyatalla/mining-backend:v${{ github.run_number }}
          dannyatalla/mining-backend:${{ steps.version.outputs.short_sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and Push Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./mining-viz
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          dannyatalla/mining-frontend:latest
          dannyatalla/mining-frontend:v${{ github.run_number }}
          dannyatalla/mining-frontend:${{ steps.version.outputs.short_sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build
    # if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/changebackend-and-makeitwork!'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Resolve CSV auto-import inputs
      id: csv_import
      run: |
        AUTO_IMPORT="${{ vars.AUTO_IMPORT_LICENSES_CSV }}"
        if [ -z "$AUTO_IMPORT" ]; then
          AUTO_IMPORT="true"
        fi

        # If it only exists in the subfolder, copy it to the root so scp-action uploads it directly to /tmp/licenses_export.csv
        if [ ! -f "licenses_export.csv" ] && [ -f "mining-viz/licenses_export.csv" ]; then
          cp mining-viz/licenses_export.csv licenses_export.csv
        fi

        if [ -f "licenses_export.csv" ]; then
          echo "csv_exists=true" >> "$GITHUB_OUTPUT"
          echo "csv_path=licenses_export.csv" >> "$GITHUB_OUTPUT"
        else
          echo "csv_exists=false" >> "$GITHUB_OUTPUT"
          echo "csv_path=" >> "$GITHUB_OUTPUT"
        fi

        echo "enabled=$AUTO_IMPORT" >> "$GITHUB_OUTPUT"

    - name: Upload official registry CSV to remote VM
      if: steps.csv_import.outputs.enabled == 'true' && steps.csv_import.outputs.csv_exists == 'true'
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        port: 22
        key: ${{ secrets.REMOTE_SSH_KEY }}
        source: ${{ steps.csv_import.outputs.csv_path }}
        target: /tmp/

    - name: Deploy to remote server
      uses: appleboy/ssh-action@v1.1.0
      env:
        AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
        ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        AUTO_IMPORT_LICENSES_CSV: ${{ steps.csv_import.outputs.enabled }}
        CSV_UPLOADED: ${{ steps.csv_import.outputs.csv_exists }}
        REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
        MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
        MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        VERSION_TAG: v${{ needs.build.outputs.build_number }}
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        port: 22
        key: ${{ secrets.REMOTE_SSH_KEY }}
        envs: AISSTREAM_API_KEY,ADMIN_TOKEN,AUTO_IMPORT_LICENSES_CSV,CSV_UPLOADED,REMOTE_HOST,VERSION_TAG,MAPBOX_ACCESS_TOKEN,MAPBOX_TOKEN
        script: |
          # Ensure directory exists and navigate
          sudo mkdir -p /opt/mining-map
          sudo mkdir -p /opt/mining-map/data
          cd /opt/mining-map

          # Persist runtime-only backend secrets on the VM for docker compose.
          MAPBOX_EFFECTIVE="${MAPBOX_ACCESS_TOKEN:-${MAPBOX_TOKEN:-}}"
          {
            printf 'AISSTREAM_API_KEY=%s\n' "$AISSTREAM_API_KEY"
            printf 'ADMIN_TOKEN=%s\n' "$ADMIN_TOKEN"
            printf 'MAPBOX_ACCESS_TOKEN=%s\n' "$MAPBOX_EFFECTIVE"
          } | sudo tee backend.env >/dev/null

          # Move uploaded CSV (if present) into a stable, writable location.
          if [ "$CSV_UPLOADED" = "true" ]; then
            if [ -f /tmp/licenses_export.csv ]; then
              sudo mv /tmp/licenses_export.csv /opt/mining-map/data/licenses_export.csv
              sudo chmod 664 /opt/mining-map/data/licenses_export.csv || true
              echo "Official registry CSV prepared at /opt/mining-map/data/licenses_export.csv"
            elif [ -f /tmp/mining-viz/licenses_export.csv ]; then
              sudo mv /tmp/mining-viz/licenses_export.csv /opt/mining-map/data/licenses_export.csv
              sudo chmod 664 /opt/mining-map/data/licenses_export.csv || true
              echo "Official registry CSV (from mining-viz) prepared at /opt/mining-map/data/licenses_export.csv"
            fi
          fi

          # Create the modern split-service docker-compose.yml
          cat <<EOF | sudo tee docker-compose.yml
          services:
            backend:
              image: dannyatalla/mining-backend:$VERSION_TAG
              platform: linux/arm64
              container_name: mining-backend
              restart: always
              env_file:
                - backend.env
              ports:
                - "8000:8000"
              environment:
                - DB_HOST=db
                - DB_PORT=5432
                - DB_NAME=mining_db
                - DB_USER=postgres
                - DB_PASSWORD=password
                - GROQ_API_KEY
                - OPENROUTER_API_KEY
                - AI_HTTP_TIMEOUT_SECONDS
                - AI_HTTP_MAX_RETRIES
                - AI_ANALYSIS_DEADLINE_SECONDS
                - AI_ENRICHMENT_DEADLINE_SECONDS
                - POLLINATIONS_HTTP_TIMEOUT_SECONDS
                - POLLINATIONS_HTTP_MAX_RETRIES
                - DISABLE_POLLINATIONS_FALLBACK
                - REDIS_HOST=redis
                - REDIS_PORT=6379
              healthcheck:
                test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=5).read(1)"]
                interval: 15s
                timeout: 8s
                retries: 5
                start_period: 180s
              depends_on:
                db:
                  condition: service_healthy
                redis:
                  condition: service_started

            maritime-worker:
              image: dannyatalla/mining-backend:$VERSION_TAG
              platform: linux/arm64
              container_name: mining-maritime-worker
              restart: always
              command: ["python", "maritime_worker.py"]
              env_file:
                - backend.env
              environment:
                - DB_HOST=db
                - DB_PORT=5432
                - DB_NAME=mining_db
                - DB_USER=postgres
                - DB_PASSWORD=password
                - MARITIME_WORKER_INTERVAL_SECONDS=60
                - MARITIME_WORKER_CAPTURE_WINDOW_SECONDS=25
                - MARITIME_WORKER_MAX_VESSELS=15000
                - MARITIME_WORKER_WATCH_MODE=all_regions
                - MARITIME_WORKER_SCOPE=all_vessels
                - MARITIME_SNAPSHOT_TTL_SECONDS=300
                - REDIS_HOST=redis
                - REDIS_PORT=6379
              depends_on:
                db:
                  condition: service_healthy
                redis:
                  condition: service_started

            license-sync-worker:
              image: dannyatalla/mining-backend:$VERSION_TAG
              platform: linux/arm64
              container_name: mining-license-sync-worker
              restart: always
              command: ["python", "license_daily_sync_worker.py"]
              env_file:
                - backend.env
              environment:
                - DB_HOST=db
                - DB_PORT=5432
                - DB_NAME=mining_db
                - DB_USER=postgres
                - DB_PASSWORD=password
                - LICENSE_DAILY_SYNC_INTERVAL_SECONDS=86400
                - LICENSE_DAILY_SYNC_BACKOFF_SECONDS=600
                - REDIS_HOST=redis
                - REDIS_PORT=6379
              depends_on:
                db:
                  condition: service_healthy
                redis:
                  condition: service_started

            redis:
              image: redis:alpine
              platform: linux/arm64
              container_name: mining-redis
              restart: always
              ports:
                - "6379:6379"

            frontend:
              image: dannyatalla/mining-frontend:$VERSION_TAG
              platform: linux/arm64
              container_name: mining-frontend
              restart: always
              ports:
                - "5173:5173"
              environment:
                - VITE_API_BASE=http://${REMOTE_HOST}:8000
              depends_on:
                backend:
                  condition: service_healthy

            db:
              image: dannyatalla/mining-db:latest
              platform: linux/arm64
              container_name: mining-db
              restart: always
              environment:
                POSTGRES_DB: mining_db
                POSTGRES_USER: postgres
                POSTGRES_PASSWORD: password
              volumes:
                - postgres_data:/var/lib/postgresql/data
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U postgres -d mining_db"]
                interval: 5s
                timeout: 5s
                retries: 5

          volumes:
            postgres_data:
          EOF

          # Pull and Restart
          sudo docker compose pull

          # Export AI runtime config in this same shell for docker compose (sudo -E below).
          # DISABLE_POLLINATIONS_FALLBACK=1 is intentional in prod: dossier AI requires
          # GROQ_API_KEY and/or OPENROUTER_API_KEY repo secrets; Pollinations is not used.
          export GROQ_API_KEY='${{ secrets.GROQ_API_KEY }}'
          export OPENROUTER_API_KEY='${{ secrets.OPENROUTER_API_KEY }}'
          export DISABLE_POLLINATIONS_FALLBACK=1
          export AI_HTTP_TIMEOUT_SECONDS="${AI_HTTP_TIMEOUT_SECONDS:-18}"
          export AI_HTTP_MAX_RETRIES="${AI_HTTP_MAX_RETRIES:-1}"
          export AI_ANALYSIS_DEADLINE_SECONDS="${AI_ANALYSIS_DEADLINE_SECONDS:-45}"
          export AI_ENRICHMENT_DEADLINE_SECONDS="${AI_ENRICHMENT_DEADLINE_SECONDS:-20}"
          export POLLINATIONS_HTTP_TIMEOUT_SECONDS="${POLLINATIONS_HTTP_TIMEOUT_SECONDS:-12}"
          export POLLINATIONS_HTTP_MAX_RETRIES="${POLLINATIONS_HTTP_MAX_RETRIES:-0}"
          export MAPBOX_ACCESS_TOKEN="${MAPBOX_EFFECTIVE}"
          sudo -E docker compose up -d --remove-orphans

          # Wait until /licenses returns 200
          BACKEND_READY="false"
          for i in $(seq 1 90); do
            HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" --connect-timeout 2 --max-time 120 \
              "http://localhost:8000/licenses" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              BACKEND_READY="true"
              break
            fi
            sleep 2
          done

          sudo docker compose exec -T backend python -c "import os; keys=('GROQ_API_KEY','OPENROUTER_API_KEY','DISABLE_POLLINATIONS_FALLBACK','MAPBOX_ACCESS_TOKEN','AI_HTTP_TIMEOUT_SECONDS','AI_HTTP_MAX_RETRIES','AI_ANALYSIS_DEADLINE_SECONDS','AI_ENRICHMENT_DEADLINE_SECONDS','POLLINATIONS_HTTP_TIMEOUT_SECONDS','POLLINATIONS_HTTP_MAX_RETRIES'); [print(f'{key}={\"SET\" if os.getenv(key) else \"MISSING\"}') for key in keys]"

          if [ "$BACKEND_READY" = "true" ] && [ "${AUTO_IMPORT_LICENSES_CSV}" = "true" ] && [ -f /opt/mining-map/data/licenses_export.csv ] && [ -n "${ADMIN_TOKEN}" ]; then
            IMPORT_STATUS=$(curl -sS -o /tmp/licenses_import_response.json -w "%{http_code}" \
              -X POST "http://localhost:8000/api/admin/import/extracted-csv?countries=South%20Africa,Ghana&sector=mining" \
              -H "X-Admin-Token: ${ADMIN_TOKEN}" \
              -F "file=@/opt/mining-map/data/licenses_export.csv")
            echo "CSV auto-import status: $IMPORT_STATUS"
          fi
          
          # Deep Clean
          sudo docker image prune -af
