name: Docker Image CI and Remote Deployment

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set Build Version
      id: version
      run: |
        echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV

    - name: Build and Push Backend
      run: |
        docker build -t dannyatalla/mining-backend:v${{ env.BUILD_NUMBER }} ./backend
        docker push dannyatalla/mining-backend:v${{ env.BUILD_NUMBER }}

    - name: Build and Push Frontend (MadSan Global Intelligence)
      run: |
        docker build -t dannyatalla/mining-frontend:v${{ env.BUILD_NUMBER }} ./mining-viz
        docker push dannyatalla/mining-frontend:v${{ env.BUILD_NUMBER }}

    - name: Deploy to remote server
      uses: appleboy/ssh-action@v1.1.0
      env:
        AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        port: 22
        key: ${{ secrets.REMOTE_SSH_KEY }}
        envs: AISSTREAM_API_KEY
        script: |
          VERSION="v${{ env.BUILD_NUMBER }}"
          
          # Ensure directory exists and navigate
          sudo mkdir -p /opt/mining-map
          cd /opt/mining-map

          # Persist runtime-only backend secrets on the VM for docker compose.
          printf 'AISSTREAM_API_KEY=%s\n' "$AISSTREAM_API_KEY" | sudo tee backend.env >/dev/null

          # Create the modern split-service docker-compose.yml
          # We don't escape the $VERSION here so the actual value is written to the file
          cat <<EOF | sudo tee docker-compose.yml
          services:
            backend:
              image: dannyatalla/mining-backend:$VERSION
              container_name: mining-backend
              restart: always
              env_file:
                - backend.env
              ports:
                - "8000:8000"
              environment:
                - DB_HOST=db
                - DB_PORT=5432
                - DB_NAME=mining_db
                - DB_USER=postgres
                - DB_PASSWORD=password
              depends_on:
                db:
                  condition: service_healthy

            maritime-worker:
              image: dannyatalla/mining-backend:$VERSION
              container_name: mining-maritime-worker
              restart: always
              command: ["python", "maritime_worker.py"]
              env_file:
                - backend.env
              environment:
                - DB_HOST=db
                - DB_PORT=5432
                - DB_NAME=mining_db
                - DB_USER=postgres
                - DB_PASSWORD=password
                - MARITIME_WORKER_INTERVAL_SECONDS=60
                - MARITIME_WORKER_CAPTURE_WINDOW_SECONDS=10
                - MARITIME_WORKER_MAX_VESSELS=120
                - MARITIME_WORKER_SCOPE=all_vessels
                - MARITIME_SNAPSHOT_TTL_SECONDS=300
              depends_on:
                db:
                  condition: service_healthy

            frontend:
              image: dannyatalla/mining-frontend:$VERSION
              container_name: mining-frontend
              restart: always
              ports:
                - "5173:5173"
              environment:
                - VITE_API_BASE=http://${{ secrets.REMOTE_HOST }}:8000
              depends_on:
                - backend

            db:
              image: postgis/postgis:15-3.3-alpine
              container_name: mining-db
              restart: always
              environment:
                POSTGRES_DB: mining_db
                POSTGRES_USER: postgres
                POSTGRES_PASSWORD: password
              volumes:
                - postgres_data:/var/lib/postgresql/data
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U postgres -d mining_db"]
                interval: 5s
                timeout: 5s
                retries: 5

          volumes:
            postgres_data:
          EOF

          # Stop and remove the OLD monolithic container if it exists
          sudo docker rm -f mining-map-app-1 mining-map-auto || true

          # Pull and Restart using the new split architecture
          sudo docker compose pull
          sudo docker compose up -d --remove-orphans
          
          # Deep Clean: Remove ALL unused images to reclaim maximum disk space
          sudo docker image prune -af
