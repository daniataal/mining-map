name: Docker Image CI and Remote Deployment

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set Build Version
      id: version
      run: |
        echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV

    - name: Build and Push Backend
      run: |
        docker build -t dannyatalla/mining-backend:v${{ env.BUILD_NUMBER }} ./backend
        docker push dannyatalla/mining-backend:v${{ env.BUILD_NUMBER }}

    - name: Build and Push Admin Frontend
      run: |
        docker build -t dannyatalla/mining-frontend-admin:v${{ env.BUILD_NUMBER }} ./mining-viz
        docker push dannyatalla/mining-frontend-admin:v${{ env.BUILD_NUMBER }}

    - name: Build and Push Community Frontend
      run: |
        docker build -t dannyatalla/mining-frontend-community:v${{ env.BUILD_NUMBER }} ./community-miner-viz
        docker push dannyatalla/mining-frontend-community:v${{ env.BUILD_NUMBER }}

    - name: Deploy to remote server
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        port: 22
        key: ${{ secrets.REMOTE_SSH_KEY }}
        script: |
          VERSION="v${{ env.BUILD_NUMBER }}"
          
          # Ensure directory exists and navigate
          sudo mkdir -p /opt/mining-map
          cd /opt/mining-map

          # Create the modern split-service docker-compose.yml
          # We don't escape the $VERSION here so the actual value is written to the file
          cat <<EOF | sudo tee docker-compose.yml
          services:
            backend:
              image: dannyatalla/mining-backend:$VERSION
              container_name: mining-backend
              restart: always
              ports:
                - "8000:8000"
              environment:
                - DB_HOST=db
                - DB_PORT=5432
                - DB_NAME=mining_db
                - DB_USER=postgres
                - DB_PASSWORD=password
              depends_on:
                db:
                  condition: service_healthy

            frontend-admin:
              image: dannyatalla/mining-frontend-admin:$VERSION
              container_name: mining-frontend-admin
              restart: always
              ports:
                - "5173:5173"
              environment:
                - VITE_API_BASE=http://${{ secrets.REMOTE_HOST }}:8000
              depends_on:
                - backend

            frontend-community:
              image: dannyatalla/mining-frontend-community:$VERSION
              container_name: mining-frontend-community
              restart: always
              ports:
                - "5174:5174"
              environment:
                - VITE_API_BASE=http://${{ secrets.REMOTE_HOST }}:8000
              depends_on:
                - backend

            db:
              image: postgres:15-alpine
              container_name: mining-db
              restart: always
              environment:
                POSTGRES_DB: mining_db
                POSTGRES_USER: postgres
                POSTGRES_PASSWORD: password
              ports:
                - "5432:5432"
              volumes:
                - postgres_data:/var/lib/postgresql/data
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U postgres -d mining_db"]
                interval: 5s
                timeout: 5s
                retries: 5

          volumes:
            postgres_data:
          EOF

          # Stop and remove the OLD monolithic container if it exists
          sudo docker rm -f mining-map-app-1 mining-map-auto || true

          # Pull and Restart using the new split architecture
          sudo docker compose pull
          sudo docker compose up -d --remove-orphans
          
          # Deep Clean: Remove ALL unused images to reclaim maximum disk space
          sudo docker image prune -af
