name: "Build Custom PostGIS Database"

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag (e.g. v1.0.0)'
        required: true
        default: 'latest'

jobs:
  build-db:
    name: Build and Push Multi-Arch PostGIS
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push
      uses: docker/build-push-action@v5
      with:
        context: ./db
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          dannyatalla/mining-db:${{ github.event.inputs.version }}
          dannyatalla/mining-db:latest
        cache-from: type=gha,scope=mining-db
        cache-to: type=gha,mode=max,scope=mining-db
