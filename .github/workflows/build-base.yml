# Legacy mining-map / oil-live-intel base images. MadSan builds from madsan/deploy/Dockerfile.*.
name: Build Base Images (legacy, manual)

on:
  workflow_dispatch:

jobs:
  build-base:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mining-map-base
            context: .
            file: ./Dockerfile.base
            image: dannyatalla/mining-map-base
            cache_scope: mining-map-base
          - name: oil-live-intel-base
            context: ./oil-live-intel
            file: ./oil-live-intel/Dockerfile.base
            image: dannyatalla/oil-live-intel-base
            cache_scope: oil-live-intel-base

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/arm64
          push: true
          tags: ${{ matrix.image }}:latest
          cache-from: |
            type=gha,scope=${{ matrix.cache_scope }}
            type=registry,ref=${{ matrix.image }}:latest
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
