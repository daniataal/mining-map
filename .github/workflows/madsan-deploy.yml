# MadSan VM deploy — docker compose on linux/arm64 prod host.
# Does NOT deploy mining-viz / legacy stack.
#
# Pipeline chain (push to main with madsan/** changes):
#   1. MadSan backend + MadSan frontend (parallel CI gates)
#   2. MadSan Docker validate (compose + build, no push)
#   3. MadSan Docker publish → Docker Hub (dannyatalla/madsan-api, dannyatalla/madsan-frontend)
#   4. This workflow (workflow_run after publish) → SSH VM → compose pull + up + health
#
# Compose services deployed:
#   madsan-db (imresamu/postgis arm64), madsan-api/worker/scheduler/ais-ingest (madsan-api image),
#   madsan-frontend (madsan-frontend image), caddy (caddy:2-alpine, --profile proxy)
#
# PRs never deploy. Use workflow_dispatch for manual prod deploy.
# Required GitHub secrets (repository Settings → Secrets):
#   DOCKER_USERNAME, DOCKER_PASSWORD — registry push (madsan-publish.yml)
#   REMOTE_HOST, REMOTE_SSH_KEY — SSH deploy to prod VM (user is ubuntu on Oracle ARM; do not use opc)
# Optional aliases (used only when REMOTE_* is unset): MADSAN_DEPLOY_HOST, MADSAN_DEPLOY_SSH_KEY
# Optional repo variable: MADSAN_NEXT_PUBLIC_API_URL — baked into frontend at publish (match deploy/.env on VM)
# Application API keys live in madsan/deploy/.env on the VM — not in GitHub.

name: MadSan deploy

on:
  workflow_run:
    workflows:
      - MadSan Docker publish
    types:
      - completed
    branches:
      - main
      - master
      - paperclip2
  push:
    branches:
      - main
      - master
      - paperclip2
    paths:
      - .github/workflows/madsan-deploy.yml
      - madsan/scripts/deploy_prod_vm.sh
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (branch, tag, or SHA)
        required: false
        default: main
      image_tag:
        description: Registry tag to pull (default latest)
        required: false
        default: latest
      skip_ci_gate:
        description: Skip CI gate checks (emergency only)
        type: boolean
        required: false
        default: false

concurrency:
  group: madsan-deploy-prod
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  gate:
    name: CI gate
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        (
          github.event.workflow_run.event == 'push' ||
          github.event.workflow_run.event == 'workflow_run'
        )
      )
    outputs:
      deploy_sha: ${{ steps.resolve.outputs.deploy_sha }}
      deploy_ref: ${{ steps.resolve.outputs.deploy_ref }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event_name == 'push' && github.sha || github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Resolve deploy SHA and image tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy_ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "deploy_ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "image_tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_ref=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
            echo "image_tag=v${{ github.event.workflow_run.run_number }}" >> "$GITHUB_OUTPUT"
          fi
          echo "deploy_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Require MadSan path changes (auto deploy only)
        if: github.event_name == 'workflow_run'
        run: |
          if ! git diff --name-only HEAD^ HEAD | grep -qE '^(madsan/|\.github/workflows/madsan-)'; then
            echo "No madsan/** changes in this push — skipping deploy."
            exit 1
          fi

      - name: Verify backend and frontend CI (if they ran)
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_SHA: ${{ steps.resolve.outputs.deploy_sha }}
        run: |
          set -euo pipefail
          for wf in "MadSan backend" "MadSan frontend"; do
            row="$(gh run list \
              --workflow="$wf" \
              --commit="$DEPLOY_SHA" \
              --limit 1 \
              --json databaseId,conclusion,status 2>/dev/null || echo '[]')"
            count="$(echo "$row" | jq 'length')"
            if [ "$count" -eq 0 ]; then
              echo "$wf: no run for $DEPLOY_SHA (path filter skipped) — OK"
              continue
            fi
            conclusion="$(echo "$row" | jq -r '.[0].conclusion // empty')"
            status="$(echo "$row" | jq -r '.[0].status // empty')"
            if [ "$status" != "completed" ] || [ "$conclusion" != "success" ]; then
              echo "$wf: status=$status conclusion=$conclusion — blocking deploy"
              exit 1
            fi
            echo "$wf: success"
          done

  deploy:
    name: Deploy to VM
    needs: gate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.deploy_sha }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_SHA: ${{ needs.gate.outputs.deploy_sha }}
          DEPLOY_REF: ${{ needs.gate.outputs.deploy_ref }}
          IMAGE_TAG: ${{ needs.gate.outputs.image_tag }}
          MADSAN_DEPLOY_PATH: /opt/madsan
          LEGACY_DEPLOY_PATH: /opt/mining-map
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        with:
          host: ${{ secrets.REMOTE_HOST || secrets.MADSAN_DEPLOY_HOST }}
          # Oracle ARM prod VM rejects opc — must SSH as ubuntu (all 15 prior deploys failed in ~3s with opc).
          username: ubuntu
          key: ${{ secrets.REMOTE_SSH_KEY || secrets.MADSAN_DEPLOY_SSH_KEY }}
          port: 22
          command_timeout: 15m
          envs: DEPLOY_SHA,DEPLOY_REF,IMAGE_TAG,MADSAN_DEPLOY_PATH,LEGACY_DEPLOY_PATH,GITHUB_REPOSITORY,GITHUB_TOKEN
          script_stop: true
          script: |
            /bin/bash -euo pipefail <<'EOF'
            DEPLOY_PATH="${MADSAN_DEPLOY_PATH:-/opt/madsan}"
            SCRIPT="${DEPLOY_PATH}/madsan/scripts/deploy_prod_vm.sh"
            if [ -x "${SCRIPT}" ]; then
              exec "${SCRIPT}"
            fi
            # First bootstrap: sync checkout then run deploy script from main.
            if [ -d "${DEPLOY_PATH}/.git" ]; then
              cd "${DEPLOY_PATH}"
              git fetch --tags origin
              git reset --hard origin/main
              chmod +x madsan/scripts/deploy_prod_vm.sh
              exec madsan/scripts/deploy_prod_vm.sh
            fi
            # No checkout yet — clone via deploy script after copying a minimal bootstrap.
            FALLBACK="/tmp/madsan-deploy-bootstrap-$$"
            git clone --depth 1 "https://github.com/${GITHUB_REPOSITORY}.git" "${FALLBACK}"
            chmod +x "${FALLBACK}/madsan/scripts/deploy_prod_vm.sh"
            exec env MADSAN_DEPLOY_PATH="${DEPLOY_PATH}" "${FALLBACK}/madsan/scripts/deploy_prod_vm.sh"
            EOF
