# MadSan VM deploy — docker compose on linux/arm64 prod host.
# Does NOT deploy mining-viz / legacy stack.
#
# Pipeline chain (push to main with madsan/** changes):
#   1. MadSan backend + MadSan frontend (parallel CI gates)
#   2. MadSan Docker validate (compose + build, no push)
#   3. MadSan Docker publish → Docker Hub (dannyatalla/madsan-api, dannyatalla/madsan-frontend)
#   4. This workflow (workflow_run after publish) → SSH VM → compose pull + up + health
#
# Compose services deployed:
#   madsan-db (postgis/postgis), madsan-api/worker/scheduler/ais-ingest (madsan-api image),
#   madsan-frontend (madsan-frontend image), caddy (caddy:2-alpine, --profile proxy)
#
# PRs never deploy. Use workflow_dispatch for manual prod deploy.
# Required GitHub secrets (repository Settings → Secrets):
#   DOCKER_USERNAME, DOCKER_PASSWORD — registry push (madsan-publish.yml)
#   REMOTE_HOST, REMOTE_USER, REMOTE_SSH_KEY — SSH deploy to prod VM
# Optional aliases (used only when REMOTE_* is unset): MADSAN_DEPLOY_HOST, MADSAN_DEPLOY_USER, MADSAN_DEPLOY_SSH_KEY
# Optional repo variable: MADSAN_NEXT_PUBLIC_API_URL — baked into frontend at publish (match deploy/.env on VM)
# Application API keys live in madsan/deploy/.env on the VM — not in GitHub.

name: MadSan deploy

on:
  workflow_run:
    workflows:
      - MadSan Docker publish
    types:
      - completed
    branches:
      - main
      - master
      - paperclip2
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (branch, tag, or SHA)
        required: false
        default: main
      image_tag:
        description: Registry tag to pull (default latest)
        required: false
        default: latest
      skip_ci_gate:
        description: Skip CI gate checks (emergency only)
        type: boolean
        required: false
        default: false

concurrency:
  group: madsan-deploy-prod
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  gate:
    name: CI gate
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        (
          github.event.workflow_run.event == 'push' ||
          github.event.workflow_run.event == 'workflow_run'
        )
      )
    outputs:
      deploy_sha: ${{ steps.resolve.outputs.deploy_sha }}
      deploy_ref: ${{ steps.resolve.outputs.deploy_ref }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Resolve deploy SHA and image tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy_ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_ref=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
            echo "image_tag=v${{ github.event.workflow_run.run_number }}" >> "$GITHUB_OUTPUT"
          fi
          echo "deploy_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Require MadSan path changes (auto deploy only)
        if: github.event_name == 'workflow_run'
        run: |
          if ! git diff --name-only HEAD^ HEAD | grep -qE '^(madsan/|\.github/workflows/madsan-)'; then
            echo "No madsan/** changes in this push — skipping deploy."
            exit 1
          fi

      - name: Verify backend and frontend CI (if they ran)
        if: github.event_name != 'workflow_dispatch' || inputs.skip_ci_gate != true
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_SHA: ${{ steps.resolve.outputs.deploy_sha }}
        run: |
          set -euo pipefail
          for wf in "MadSan backend" "MadSan frontend"; do
            row="$(gh run list \
              --workflow="$wf" \
              --commit="$DEPLOY_SHA" \
              --limit 1 \
              --json databaseId,conclusion,status 2>/dev/null || echo '[]')"
            count="$(echo "$row" | jq 'length')"
            if [ "$count" -eq 0 ]; then
              echo "$wf: no run for $DEPLOY_SHA (path filter skipped) — OK"
              continue
            fi
            conclusion="$(echo "$row" | jq -r '.[0].conclusion // empty')"
            status="$(echo "$row" | jq -r '.[0].status // empty')"
            if [ "$status" != "completed" ] || [ "$conclusion" != "success" ]; then
              echo "$wf: status=$status conclusion=$conclusion — blocking deploy"
              exit 1
            fi
            echo "$wf: success"
          done

  deploy:
    name: Deploy to VM
    needs: gate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.deploy_sha }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_SHA: ${{ needs.gate.outputs.deploy_sha }}
          DEPLOY_REF: ${{ needs.gate.outputs.deploy_ref }}
          IMAGE_TAG: ${{ needs.gate.outputs.image_tag }}
          MADSAN_DEPLOY_PATH: /opt/madsan
          LEGACY_DEPLOY_PATH: /opt/mining-map
          COMPOSE_PROJECT_NAME: madsan
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        with:
          host: ${{ secrets.REMOTE_HOST || secrets.MADSAN_DEPLOY_HOST }}
          username: ${{ secrets.REMOTE_USER || secrets.MADSAN_DEPLOY_USER }}
          key: ${{ secrets.REMOTE_SSH_KEY || secrets.MADSAN_DEPLOY_SSH_KEY }}
          port: 22
          envs: DEPLOY_SHA,DEPLOY_REF,IMAGE_TAG,MADSAN_DEPLOY_PATH,LEGACY_DEPLOY_PATH,COMPOSE_PROJECT_NAME,GITHUB_REPOSITORY,GITHUB_TOKEN
          script_stop: true
          script: |
            set -euo pipefail

            DEPLOY_PATH="${MADSAN_DEPLOY_PATH:-/opt/madsan}"
            LEGACY_PATH="${LEGACY_DEPLOY_PATH:-/opt/mining-map}"
            export COMPOSE_PROJECT_NAME="${COMPOSE_PROJECT_NAME:-madsan}"

            _ensure_deploy_path_ready() {
              local path="$1"
              if [ -d "${path}" ]; then
                if [ -w "${path}" ]; then
                  return 0
                fi
                if [ -z "$(ls -A "${path}" 2>/dev/null || true)" ]; then
                  sudo chown "$(whoami):$(whoami)" "${path}"
                  return 0
                fi
                echo "ERROR: ${path} exists, is not writable, and is not empty"
                return 1
              fi
              sudo mkdir -p "${path}"
              sudo chown "$(whoami):$(whoami)" "${path}"
            }

            _volume_is_empty() {
              local vol="$1"
              if ! docker volume inspect "${vol}" >/dev/null 2>&1; then
                return 0
              fi
              local count
              count="$(docker run --rm -v "${vol}:/v" alpine sh -c 'ls -A /v 2>/dev/null | wc -l' 2>/dev/null || echo 0)"
              [ "${count}" -eq 0 ]
            }

            _bootstrap_deploy_checkout() {
              if [ -d "${DEPLOY_PATH}/.git" ]; then
                return 0
              fi

              echo "Bootstrapping ${DEPLOY_PATH} (not a git checkout)..."

              if [ -d "${LEGACY_PATH}/.git" ] && [ -r "${LEGACY_PATH}" ]; then
                if [ ! -e "${DEPLOY_PATH}" ] || [ -z "$(ls -A "${DEPLOY_PATH}" 2>/dev/null || true)" ]; then
                  rm -rf "${DEPLOY_PATH}" 2>/dev/null || sudo rm -rf "${DEPLOY_PATH}" 2>/dev/null || true
                  if [ ! -e "${DEPLOY_PATH}" ]; then
                    sudo ln -sfn "${LEGACY_PATH}" "${DEPLOY_PATH}" 2>/dev/null \
                      || ln -sfn "${LEGACY_PATH}" "${DEPLOY_PATH}"
                  fi
                  echo "Linked ${DEPLOY_PATH} -> ${LEGACY_PATH} (legacy checkout)"
                  return 0
                fi
                echo "WARN: ${DEPLOY_PATH} is non-empty and not a git repo — cannot symlink legacy ${LEGACY_PATH}"
              fi

              if [ -d "${DEPLOY_PATH}" ] && [ -n "$(ls -A "${DEPLOY_PATH}" 2>/dev/null || true)" ]; then
                echo "ERROR: ${DEPLOY_PATH} is not empty and not a git checkout — manual cleanup required"
                exit 1
              fi

              if [ -z "${GITHUB_REPOSITORY:-}" ]; then
                echo "ERROR: GITHUB_REPOSITORY not set — cannot clone"
                exit 1
              fi
              if [ -z "${GITHUB_TOKEN:-}" ]; then
                echo "ERROR: GITHUB_TOKEN not set — cannot clone private repo"
                exit 1
              fi

              _clone_repo() {
                local target="$1"
                echo "Cloning https://github.com/${GITHUB_REPOSITORY}.git into ${target}..."
                git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "${target}"
                git -C "${target}" remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
              }

              if _ensure_deploy_path_ready "${DEPLOY_PATH}"; then
                rm -rf "${DEPLOY_PATH}" 2>/dev/null || sudo rm -rf "${DEPLOY_PATH}" 2>/dev/null || true
                _ensure_deploy_path_ready "${DEPLOY_PATH}"
                _clone_repo "${DEPLOY_PATH}"
              else
                FALLBACK_PATH="${HOME}/madsan"
                echo "WARN: cannot prepare ${DEPLOY_PATH} (passwordless sudo for mkdir/chown required) — cloning to ${FALLBACK_PATH}"
                rm -rf "${FALLBACK_PATH}" 2>/dev/null || true
                _clone_repo "${FALLBACK_PATH}"
                if sudo ln -sfn "${FALLBACK_PATH}" "${DEPLOY_PATH}" 2>/dev/null; then
                  echo "Symlinked ${DEPLOY_PATH} -> ${FALLBACK_PATH}"
                else
                  echo "WARN: could not symlink ${DEPLOY_PATH}; using ${FALLBACK_PATH} for this deploy"
                  DEPLOY_PATH="${FALLBACK_PATH}"
                fi
              fi
            }

            _bootstrap_deploy_checkout

            cd "${DEPLOY_PATH}"
            git fetch --tags origin
            git checkout "${DEPLOY_SHA}"

            if [ -f madsan/deploy/docker-compose.yml ]; then
              COMPOSE_DIR="madsan/deploy"
              REPO_ROOT="${DEPLOY_PATH}"
              SEED_SCRIPT="madsan/scripts/seed_prod_volumes.sh"
            elif [ -f deploy/docker-compose.yml ]; then
              COMPOSE_DIR="deploy"
              REPO_ROOT="${DEPLOY_PATH}"
              SEED_SCRIPT="scripts/seed_prod_volumes.sh"
            else
              echo "ERROR: cannot find docker-compose.yml under ${DEPLOY_PATH}"
              exit 1
            fi

            ENV_FILE="${REPO_ROOT}/${COMPOSE_DIR}/.env"
            ENV_EXAMPLE="${REPO_ROOT}/${COMPOSE_DIR}/.env.example"
            if [ ! -f "${ENV_FILE}" ]; then
              if [ -f "${ENV_EXAMPLE}" ]; then
                cp "${ENV_EXAMPLE}" "${ENV_FILE}"
                echo "Created ${ENV_FILE} from .env.example — set secrets on the host before relying on prod traffic"
              else
                echo "ERROR: missing ${ENV_FILE} and ${ENV_EXAMPLE}"
                exit 1
              fi
            fi

            if _volume_is_empty madsan_raw_data || _volume_is_empty madsan_etl_data; then
              if [ -x "${REPO_ROOT}/${SEED_SCRIPT}" ]; then
                echo "Seeding empty prod volumes via ${SEED_SCRIPT}..."
                (cd "${REPO_ROOT}" && "./${SEED_SCRIPT}")
              else
                echo "WARN: ${SEED_SCRIPT} missing or not executable — skipping volume seed"
              fi
            else
              echo "Prod volumes already populated — skipping seed_prod_volumes.sh"
            fi

            LEGACY_COMPOSE="${LEGACY_PATH}/docker-compose.prod.yml"
            if [ -f "${LEGACY_COMPOSE}" ]; then
              echo "Stopping legacy mining-map stack at ${LEGACY_PATH} (volumes preserved)..."
              _legacy_down() {
                cd "${LEGACY_PATH}"
                docker compose -f docker-compose.prod.yml down --remove-orphans
              }
              if ! _legacy_down 2>/dev/null; then
                sudo bash -c "cd '${LEGACY_PATH}' && docker compose -f docker-compose.prod.yml down --remove-orphans"
              fi
            else
              echo "No legacy compose at ${LEGACY_COMPOSE} — skipping legacy shutdown"
            fi

            COMPOSE_BASE=(docker compose -f "${COMPOSE_DIR}/docker-compose.yml" -f "${COMPOSE_DIR}/docker-compose.prod.yml")
            PROFILES=(--profile proxy)
            if grep -Eq '^AISSTREAM_API_KEY=.+$' "${ENV_FILE}"; then
              PROFILES+=(--profile ais)
              echo "AISSTREAM_API_KEY set — enabling ais profile"
            else
              echo "AISSTREAM_API_KEY unset — skipping ais profile"
            fi

            echo "Deploying ${DEPLOY_SHA} (${DEPLOY_REF}) IMAGE_TAG=${IMAGE_TAG} from ${DEPLOY_PATH}"
            export IMAGE_TAG="${IMAGE_TAG:-latest}"

            PULL_SERVICES=(madsan-api madsan-worker madsan-scheduler madsan-frontend)
            if grep -Eq '^AISSTREAM_API_KEY=.+$' "${ENV_FILE}"; then
              PULL_SERVICES+=(madsan-ais-ingest)
            fi

            PULL_OK=true
            if ! "${COMPOSE_BASE[@]}" "${PROFILES[@]}" pull "${PULL_SERVICES[@]}"; then
              echo "Registry pull failed — falling back to on-VM build"
              PULL_OK=false
            fi

            if [ "${PULL_OK}" = "false" ]; then
              "${COMPOSE_BASE[@]}" "${PROFILES[@]}" build --pull
            fi

            CRITICAL_SERVICES=(madsan-db madsan-api madsan-worker madsan-scheduler madsan-frontend caddy)
            if grep -Eq '^AISSTREAM_API_KEY=.+$' "${ENV_FILE}"; then
              CRITICAL_SERVICES+=(madsan-ais-ingest)
            fi

            echo "Bringing up stack (waiting for healthchecks)..."
            if ! "${COMPOSE_BASE[@]}" "${PROFILES[@]}" up -d --remove-orphans --wait --wait-timeout 180; then
              echo "WARN: compose --wait failed or timed out — falling back to manual health poll"
            fi

            _service_health_ok() {
              local svc="$1"
              local row
              row="$("${COMPOSE_BASE[@]}" "${PROFILES[@]}" ps --status running --format json "${svc}" 2>/dev/null | head -1 || true)"
              if [ -z "${row}" ]; then
                return 1
              fi
              local health
              health="$(echo "${row}" | jq -r '.Health // empty' 2>/dev/null || true)"
              if [ -z "${health}" ] || [ "${health}" = "healthy" ]; then
                return 0
              fi
              return 1
            }

            echo "Verifying critical services: ${CRITICAL_SERVICES[*]}"
            READY=false
            for i in $(seq 1 90); do
              ALL_OK=true
              for svc in "${CRITICAL_SERVICES[@]}"; do
                if ! _service_health_ok "${svc}"; then
                  ALL_OK=false
                  break
                fi
              done
              if [ "${ALL_OK}" = "true" ]; then
                READY=true
                break
              fi
              sleep 2
            done

            if [ "${READY}" != "true" ]; then
              echo "ERROR: compose health poll failed"
              "${COMPOSE_BASE[@]}" "${PROFILES[@]}" ps
              exit 1
            fi
            echo "Compose health checks passed for: ${CRITICAL_SERVICES[*]}"

            echo "Verifying edge health via Caddy..."
            CURL_OK=false
            for i in $(seq 1 30); do
              if curl -fsS --connect-timeout 2 --max-time 10 http://127.0.0.1/health >/dev/null 2>&1; then
                CURL_OK=true
                break
              fi
              sleep 2
            done

            if [ "${CURL_OK}" != "true" ]; then
              echo "ERROR: Caddy → API health check failed after deploy"
              "${COMPOSE_BASE[@]}" "${PROFILES[@]}" ps
              exit 1
            fi
            echo "Edge health check passed: http://127.0.0.1/health"

            echo "Scoped image cleanup (project=${COMPOSE_PROJECT_NAME})..."
            docker image prune -f

            mapfile -t PROJECT_IMAGES < <(docker images -q --filter "label=com.docker.compose.project=${COMPOSE_PROJECT_NAME}" 2>/dev/null | sort -u || true)
            for img_id in "${PROJECT_IMAGES[@]:-}"; do
              [ -z "${img_id}" ] && continue
              if [ -z "$(docker ps -aq --filter "ancestor=${img_id}" 2>/dev/null)" ]; then
                docker rmi "${img_id}" 2>/dev/null || true
              fi
            done

            docker builder prune -f --filter "until=48h" 2>/dev/null || true

            echo "Deploy complete."
            "${COMPOSE_BASE[@]}" ps
