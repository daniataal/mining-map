# Standalone workflow: builds Meridian Trade OS debug APK only (no Docker / backend).
# Download: Actions → this workflow → latest run → Artifacts → meridian-debug-apk

name: "Meridian Android — Build Debug APK"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "meridian-android/**"
      - ".github/workflows/meridian-android-apk.yml"
  pull_request:
    branches: [main]
    paths:
      - "meridian-android/**"
      - ".github/workflows/meridian-android-apk.yml"

jobs:
  build-debug-apk:
    name: Assemble Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Generate Gradle wrapper
        working-directory: meridian-android
        run: gradle wrapper --gradle-version=8.7 --distribution-type=bin

      - name: Make gradlew executable
        run: chmod +x meridian-android/gradlew

      # Fork PRs: repo secrets are not exposed to workflows from forks; hosts stay unset and Gradle fallbacks apply.
      - name: Build Debug APK
        working-directory: meridian-android
        env:
          ORG_GRADLE_PROJECT_MERIDIAN_WEB_HOST: ${{ secrets.MERIDIAN_WEB_HOST }}
          ORG_GRADLE_PROJECT_MERIDIAN_API_HOST: ${{ secrets.MERIDIAN_API_HOST }}
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload meridian-debug-apk
        uses: actions/upload-artifact@v4
        with:
          name: meridian-debug-apk
          path: meridian-android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
