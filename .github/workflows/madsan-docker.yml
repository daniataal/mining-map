# MadSan Docker validation — compose config sanity + image build (no registry push).
# VM deploy after publish: .github/workflows/madsan-deploy.yml
# Registry push (main only): .github/workflows/madsan-publish.yml
name: MadSan Docker validate

on:
  pull_request:
    paths:
      - "madsan/deploy/**"
      - "madsan/backend/**"
      - "madsan/frontend/**"
      - ".github/workflows/madsan-docker.yml"
  push:
    branches:
      - main
      - master
      - paperclip2
    paths:
      - "madsan/deploy/**"
      - "madsan/backend/**"
      - "madsan/frontend/**"
      - ".github/workflows/madsan-docker.yml"

concurrency:
  group: madsan-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose-config:
    name: Validate compose YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: docker compose config (dev + prod overlay)
        working-directory: madsan/deploy
        env:
          MADSAN_DB_PASSWORD: ci-placeholder
          MADSAN_JWT_SECRET: ci-placeholder
          NEXT_PUBLIC_API_URL: http://localhost
        run: |
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet

  docker-build:
    name: Build API and frontend images
    runs-on: ubuntu-latest
    needs: compose-config
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: madsan/backend
          file: madsan/deploy/Dockerfile.api
          push: false
          tags: madsan-api:ci
          cache-from: type=gha,scope=madsan-api
          cache-to: type=gha,mode=max,scope=madsan-api

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: madsan/frontend
          file: madsan/deploy/Dockerfile.frontend
          push: false
          tags: madsan-frontend:ci
          build-args: NEXT_PUBLIC_API_URL=http://localhost
          cache-from: type=gha,scope=madsan-frontend
          cache-to: type=gha,mode=max,scope=madsan-frontend
