# Runs MadSan CI while madsan/ lives inside mining-map.
# After repo split, use madsan/.github/workflows/ci.yml at the new repo root.
name: MadSan CI

on:
  pull_request:
    paths:
      - "madsan/**"
      - ".github/workflows/madsan-ci.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "madsan/**"
      - ".github/workflows/madsan-ci.yml"

concurrency:
  group: madsan-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-typecheck:
    name: Frontend typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: madsan/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: madsan/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  backend-test:
    name: Go test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: madsan/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: madsan/backend/go.sum

      - name: Run tests
        run: go test ./...

  backend-build:
    name: Build API binary
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: madsan/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: madsan/backend/go.sum

      - name: Build API
        run: CGO_ENABLED=0 go build -o bin/api ./cmd/api

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: madsan-api-linux-amd64
          path: madsan/backend/bin/api
          if-no-files-found: error
