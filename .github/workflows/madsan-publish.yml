# MadSan Docker Hub publish — builds and pushes linux/arm64 images after Docker validate CI.
#
# Registry images (all tags: latest, v<run_number>, <short_sha>):
#   dannyatalla/madsan-api      — shared by compose services madsan-api, madsan-worker,
#                                 madsan-scheduler, madsan-ais-ingest (Dockerfile.api)
#   dannyatalla/madsan-frontend — madsan-frontend only (Dockerfile.frontend)
#
# Not built/pushed (pulled on arm64 VM): imresamu/postgis:16-3.6.1-bookworm (madsan-db), caddy:2-alpine (caddy)
#
# Chain: push main → madsan-docker.yml → (this workflow) → madsan-deploy.yml
name: MadSan Docker publish

on:
  workflow_run:
    workflows:
      - MadSan Docker validate
    types:
      - completed
    branches:
      - main
      - master
      - paperclip2
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish (branch, tag, or SHA)
        required: false
        default: main
      image_tag:
        description: Extra registry tag (also pushes latest and short SHA)
        required: false
        default: ""

concurrency:
  group: madsan-publish-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  gate:
    name: CI gate
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push'
      )
    outputs:
      publish_sha: ${{ steps.resolve.outputs.publish_sha }}
      publish_ref: ${{ steps.resolve.outputs.publish_ref }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      short_sha: ${{ steps.resolve.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Resolve publish ref and tags
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "publish_ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
            if [ -n "${{ inputs.image_tag }}" ]; then
              echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
            else
              echo "image_tag=v${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "publish_ref=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
            echo "image_tag=v${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi
          echo "publish_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Require MadSan path changes (auto publish only)
        if: github.event_name == 'workflow_run'
        run: |
          if ! git diff --name-only HEAD^ HEAD | grep -qE '^(madsan/|\.github/workflows/madsan-)'; then
            echo "No madsan/** changes in this push — skipping publish."
            exit 1
          fi

  publish:
    name: Build and push images
    needs: gate
    runs-on: ubuntu-24.04-arm
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.publish_sha }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # One image for api, worker, scheduler, and ais-ingest (different compose commands).
      - name: Build and push API image (api + worker + scheduler + ais-ingest)
        id: push_api
        uses: docker/build-push-action@v5
        with:
          context: madsan/backend
          file: madsan/deploy/Dockerfile.api
          platforms: linux/arm64
          push: true
          tags: |
            dannyatalla/madsan-api:latest
            dannyatalla/madsan-api:${{ needs.gate.outputs.image_tag }}
            dannyatalla/madsan-api:${{ needs.gate.outputs.short_sha }}
          cache-from: |
            type=gha,scope=madsan-api
            type=registry,ref=dannyatalla/madsan-api:latest
          cache-to: type=gha,mode=max,scope=madsan-api

      - name: Build and push frontend image
        id: push_frontend
        uses: docker/build-push-action@v5
        with:
          context: madsan/frontend
          file: madsan/deploy/Dockerfile.frontend
          platforms: linux/arm64
          push: true
          tags: |
            dannyatalla/madsan-frontend:latest
            dannyatalla/madsan-frontend:${{ needs.gate.outputs.image_tag }}
            dannyatalla/madsan-frontend:${{ needs.gate.outputs.short_sha }}
          build-args: NEXT_PUBLIC_API_URL=${{ vars.MADSAN_NEXT_PUBLIC_API_URL || 'http://localhost' }}
          cache-from: |
            type=gha,scope=madsan-frontend
            type=registry,ref=dannyatalla/madsan-frontend:latest
          cache-to: type=gha,mode=max,scope=madsan-frontend

      - name: Publish summary
        run: |
          TAG="${{ needs.gate.outputs.image_tag }}"
          SHA="${{ needs.gate.outputs.short_sha }}"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## MadSan images published (linux/arm64)

          | Registry image | Compose services |
          |----------------|------------------|
          | \`dannyatalla/madsan-api:${TAG}\` | \`madsan-api\`, \`madsan-worker\`, \`madsan-scheduler\`, \`madsan-ais-ingest\` |
          | \`dannyatalla/madsan-frontend:${TAG}\` | \`madsan-frontend\` |

          Also tagged: \`latest\`, \`${SHA}\`

          **Pulled on arm64 VM (not built):** \`imresamu/postgis:16-3.6.1-bookworm\` (\`madsan-db\`), \`caddy:2-alpine\` (\`caddy\`)

          Next: **MadSan deploy** pulls \`IMAGE_TAG=${TAG}\` and runs compose on the prod VM.
          EOF
