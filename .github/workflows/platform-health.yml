# DEPRECATED — legacy mining-map / mining-viz / Python platform CI.
# MadSan CI: .github/workflows/madsan-backend.yml, madsan-frontend.yml, madsan-docker.yml
# Manual rerun only until legacy stack is retired or re-homed.
name: Platform health (legacy, manual)

on:
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: oil-live-intel/go.sum

      - name: Go tests (oil-live-intel)
        working-directory: oil-live-intel
        run: go test ./internal/api/... ./internal/workers/... ./internal/services/graphsync/... ./internal/services/opportunity/... ./internal/services/ais/...

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mining-viz/package-lock.json

      - name: Frontend build
        working-directory: mining-viz
        run: npm ci && npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Python unit tests (platform)
        run: |
          pip install -r backend/requirements-dev.txt
          python -m pytest backend/tests/test_trade_manifest_ingest.py backend/tests/test_platform_health.py -q

  map-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Map routing smoke (skip if stack down)
        run: |
          chmod +x scripts/platform_map_smoke.sh scripts/license_bundle_parity.sh
          SMOKE_SKIP_IF_DOWN=1 BASE_URL=http://127.0.0.1:8080 ./scripts/platform_map_smoke.sh
          SMOKE_SKIP_IF_DOWN=1 BASE_URL=http://127.0.0.1:8080 ./scripts/license_bundle_parity.sh
