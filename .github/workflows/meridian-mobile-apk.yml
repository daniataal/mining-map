name: "Meridian Mobile — Build Release APK"

on:
  workflow_dispatch:
#  push:
#    branches: [main]
#    paths:
#      - "meridian-mobile/**"
#      - ".github/workflows/meridian-mobile-apk.yml"
#  pull_request:
#    branches: [main]
#    paths:
#      - "meridian-mobile/**"
#      - ".github/workflows/meridian-mobile-apk.yml"

jobs:
  build-release-apk:
    name: Assemble Release APK
    runs-on: ubuntu-latest
    env:
      GOOGLE_MAPS_ANDROID_API_KEY: ${{ secrets.GOOGLE_MAPS_ANDROID_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: meridian-mobile/package-lock.json

      - name: Install dependencies
        working-directory: meridian-mobile
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Prebuild Expo project
        working-directory: meridian-mobile
        run: npx expo prebuild --platform android --no-install

      - name: Build release APK
        working-directory: meridian-mobile/android
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload meridian-mobile-release-apk
        uses: actions/upload-artifact@v4
        with:
          name: meridian-mobile-release-apk
          path: meridian-mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30
