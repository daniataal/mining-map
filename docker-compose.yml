
services:
  backend:
    build: 
      context: ./backend
    container_name: mining-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=mining_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - AISSTREAM_API_KEY=${AISSTREAM_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  maritime-worker:
    build:
      context: ./backend
    container_name: mining-maritime-worker
    restart: always
    command: ["python", "maritime_worker.py"]
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=mining_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - AISSTREAM_API_KEY=${AISSTREAM_API_KEY}
      - MARITIME_WORKER_INTERVAL_SECONDS=${MARITIME_WORKER_INTERVAL_SECONDS:-60}
      - MARITIME_WORKER_CAPTURE_WINDOW_SECONDS=${MARITIME_WORKER_CAPTURE_WINDOW_SECONDS:-10}
      - MARITIME_WORKER_MAX_VESSELS=${MARITIME_WORKER_MAX_VESSELS:-120}
      - MARITIME_WORKER_SCOPE=${MARITIME_WORKER_SCOPE:-all_vessels}
      - MARITIME_SNAPSHOT_TTL_SECONDS=${MARITIME_SNAPSHOT_TTL_SECONDS:-300}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./mining-viz
    container_name: mining-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - backend

  db:
    image: postgis/postgis:15-3.3-alpine
    container_name: mining-db
    restart: always
    environment:
      POSTGRES_DB: mining_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mining_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:alpine
    container_name: mining-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
