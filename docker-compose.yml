
services:
  backend:
    build: 
      context: ./backend
    container_name: mining-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=mining_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - AISSTREAM_API_KEY=${AISSTREAM_API_KEY}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=5).read(1)",
        ]
      interval: 15s
      timeout: 8s
      retries: 5
      start_period: 180s
    depends_on:
      db:
        condition: service_healthy

  maritime-worker:
    build:
      context: ./backend
    container_name: mining-maritime-worker
    restart: always
    command: ["python", "maritime_worker.py"]
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=mining_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - AISSTREAM_API_KEY=${AISSTREAM_API_KEY}
      - MARITIME_WORKER_INTERVAL_SECONDS=${MARITIME_WORKER_INTERVAL_SECONDS:-60}
      - MARITIME_WORKER_CAPTURE_WINDOW_SECONDS=${MARITIME_WORKER_CAPTURE_WINDOW_SECONDS:-10}
      - MARITIME_WORKER_MAX_VESSELS=${MARITIME_WORKER_MAX_VESSELS:-120}
      - MARITIME_WORKER_SCOPE=${MARITIME_WORKER_SCOPE:-all_vessels}
      - MARITIME_SNAPSHOT_TTL_SECONDS=${MARITIME_SNAPSHOT_TTL_SECONDS:-300}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./mining-viz
    container_name: mining-frontend
    restart: always
    ports:
      - "5173:5173"
    # Omit VITE_API_BASE by default so the browser uses the same hostname as the
    # Vite dev server (api.ts: http://${window.location.hostname}:8000). Set in
    # .env only when you need a fixed API URL (e.g. VITE_API_BASE=http://host.docker.internal:8000 on Mac).
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-}
    depends_on:
      backend:
        condition: service_healthy

  db:
    image: postgis/postgis:15-3.3-alpine
    container_name: mining-db
    restart: always
    environment:
      POSTGRES_DB: mining_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mining_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:alpine
    container_name: mining-caddy
    restart: unless-stopped
    # Host :80/:443 are often taken (nginx, AirPlay Receiver, other stacks).
    # Override in .env: MINING_MAP_CADDY_HTTP=80 MINING_MAP_CADDY_HTTPS=443
    ports:
      - "${MINING_MAP_CADDY_HTTP:-8080}:80"
      - "${MINING_MAP_CADDY_HTTPS:-8443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
