
services:
  backend:
    build: 
      context: ./backend
    container_name: mining-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=mining_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - AWANLLM_API_KEY=${AWANLLM_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy

  frontend-admin:
    build:
      context: ./mining-viz
    container_name: mining-frontend-admin
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - backend

  frontend-community:
    build:
      context: ./community-miner-viz
    container_name: mining-frontend-community
    restart: always
    ports:
      - "5174:5174"
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    container_name: mining-db
    restart: always
    environment:
      POSTGRES_DB: mining_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mining_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:alpine
    container_name: mining-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend-admin
      - frontend-community

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
